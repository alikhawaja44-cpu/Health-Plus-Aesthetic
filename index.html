                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;

            generateInvoiceNo() {
                const year  = new Date().getFullYear().toString().substr(-2);
                const count = this.invoices.length + 1;
                return `INV-${year}-${count.toString().padStart(3,'0')}`;
            }

            formatCurrency(amount) {
                return `Rs ${Number(amount||0).toLocaleString()}`;
            }

            formatDate(dateString) {
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                return new Date(dateString).toLocaleDateString(undefined, options);
            }

            getStats() {
                const today = new Date().toISOString().split('T')[0];
                const thisMonth = new Date().getMonth();
                
                // Calculate monthly revenue trend
                const monthlyData = [0, 0, 0, 0, 0, 0];
                const now = new Date();
                
                for (let i = 5; i >= 0; i--) {
                    const month = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const monthIndex = month.getMonth();
                    
                    monthlyData[5 - i] = this.invoices
                        .filter(inv => new Date(inv.date).getMonth() === monthIndex)
                        .reduce((sum, inv) => sum + (Number(inv.amount) || 0), 0);
                }
                
                return {
                    totalPatients:       this.patients.length,
                    todayAppointments:   this.appointments.filter(a=>a.date===today).length,
                    totalAppointments:  this.appointments.length,
                    revenue:             this.invoices.reduce((s,i)=>s+(Number(i.amount)||0),0),
                    monthlyRevenue:      this.invoices

                    revenueTrend:        monthlyData

                        <div class="mr-3">
                            ${type === 'success' ? '<i class="fas fa-check-circle text-green-500 text-xl"></i>' :

                            <i class="fas fa-times"></i>
                        </button>

                // Show toast

                // Auto remove after 5 seconds

            // -----------------------------------------------------------------
            // PATIENT MANAGEMENT (now records consulting doctor & charge)
            // -----------------------------------------------------------------
            savePatient() {
                const f = document.getElementById('patient-form');
                const fd = new FormData(f);
                const data = {
                    name:    fd.get('name'),
                    age:     fd.get('age'),
                    gender:  fd.get('gender'),
                    contact: fd.get('contact'),
                    address: fd.get('address'),
                    doctorId: parseInt(fd.get('doctorId')),
                    charge:   parseFloat(fd.get('charge'))
                };
                // basic validation
                if (!data.name || !data.age || !data.contact) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (isNaN(data.doctorId) || isNaN(data.charge)) {
                    this.showNotification('Please select a doctor and enter a valid charge','error');
                    return;
                }

                if (this.editingId) {
                    // update existing patient
                    const ix = this.patients.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.patients[ix] = { ...this.patients[ix], ...data };
                        this.showNotification('Patient updated successfully','success');
                    }
                } else {
                    // add new patient
                    const newPatient = {
                        id: Date.now(),
                        mrNumber: this.generateMR(),
                        ...data,
                        registeredAt: new Date().toISOString().split('T')[0]
                    };
                    this.patients.unshift(newPatient);
                    this.showNotification('Patient registered successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deletePatient(id) {
                if (confirm('Are you sure you want to delete this patient? All related records will also be deleted.')) {
                    this.patients = this.patients.filter(p=>p.id!==id);
                    this.appointments = this.appointments.filter(a=>a.patientId!==id);
                    this.prescriptions = this.prescriptions.filter(p=>p.patientId!==id);
                    this.invoices = this.invoices.filter(i=>i.patientId!==id);
                    this.labTests = this.labTests.filter(l=>l.patientId!==id);
                    this.visits = this.visits.filter(v=>v.patientId!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Patient and related records deleted successfully','success');
                }
            }

                        this.showNotification('Appointment updated successfully','success');

                } else {

                    this.showNotification(`Appointment marked as ${status}`,'success');

            deleteAppointment(id) {

                    this.render();
                    this.showNotification('Appointment deleted successfully','success');

                    this.saveData();
                    this.render();
                    this.showNotification('Prescription deleted successfully','success');
                }

            // ----- Helpers for dynamic medicine list -----
            addPrescriptionMedication(med={}) {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                const rowId = `med-row-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                const selId = med.medicineId || '';
                const qty   = med.quantity   || '';
                const dosage = med.dosage || '';
                const duration = med.duration || '';
                
                const row   = document.createElement('div');
                row.id      = rowId;
                row.className = 'flex items-center gap-2 mb-2 flex-wrap';
                row.innerHTML = `
                    <select class="border rounded p-1 w-full md:w-4/12 bg-white"
                            onchange="app.updatePrescriptionMedStock('${rowId}', this.value)">
                        <option value="">Select Medicine</option>
                        ${this.inventory.map(i=>`
                            <option value="${i.id}" ${i.id==selId?'selected':''}>${i.name} (${i.type})</option>
                        `).join('')}
                    </select>
                    <input type="text" class="border rounded p-1 w-full md:w-2/12" placeholder="Dosage" value="${dosage}">
                    <input type="text" class="border rounded p-1 w-full md:w-2/12" placeholder="Duration" value="${duration}">
                    <input type="number" class="border rounded p-1 w-full md:w-2/12" placeholder="Qty" min="1" value="${qty}">
                    <span class="text-xs text-slate-500 w-full md:w-auto" id="${rowId}-stock"></span>
                    <button type="button" class="text-red-600" onclick="app.removePrescriptionMedication('${rowId}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(row);
                if (selId) this.updatePrescriptionMedStock(rowId, selId);
            }

            removePrescriptionMedication(rowId) {
                const r = document.getElementById(rowId);
                if (r) r.remove();
            }

            updatePrescriptionMedStock(rowId, medId) {
                const stockSpan = document.getElementById(`${rowId}-stock`);
                const med = this.inventory.find(i=>i.id==medId);
                stockSpan.textContent = med ? `Stock: ${med.stock}` : '';
            }

            renderPrescriptionMedicationRows() {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                container.innerHTML = '';
                const meds = this.formData.medicinesList || [];
                if (meds.length===0) {
                    this.addPrescriptionMedication();
                } else {
                    meds.forEach(m=>this.addPrescriptionMedication(m));
                }
            }

            // ----- Save prescription (with stock check) -----
            savePrescription() {
                const f = document.getElementById('prescription-form');
                const fd = new FormData(f);
                const patientId   = parseInt(fd.get('patientId'));
                const patientObj  = this.patients.find(p=>p.id===patientId);
                const patientName = patientObj ? patientObj.name : '';
                const diagnosis   = fd.get('diagnosis')?.trim() || '';
                const notes       = fd.get('notes')?.trim() || '';

                if (!patientName || !diagnosis) {
                    this.showNotification('Please fill in all required fields.', 'error');
                    return;
                }

                // Gather medicines from UI
                const medRows = document.querySelectorAll('#prescription-meds-list > div');
                const meds = [];
                for (let row of medRows) {
                    const inputs = row.querySelectorAll('input');
                    const sel   = row.querySelector('select');
                    const medId = parseInt(sel.value);
                    const dosage = inputs[0].value;
                    const duration = inputs[1].value;
                    const qty   = parseInt(inputs[2].value);
                    
                    if (!medId || !dosage || !duration || isNaN(qty) || qty<=0) {
                        this.showNotification('Fill in all medicine details for each line.', 'error');
                        return;
                    }
                    const invItem = this.inventory.find(i=>i.id===medId);
                    if (!invItem) {
                        this.showNotification('Medicine not found in inventory.', 'error');
                        return;
                    }
                    if (qty>invItem.stock) {
                        this.showNotification(`Insufficient stock for ${invItem.name}. Available: ${invItem.stock}`, 'error');
                        return;
                    }
                    meds.push({
                        medicineId: medId,
                        name:       invItem.name,
                        type:       invItem.type,
                        dosage:     dosage,
                        duration:   duration,
                        quantity:   qty
                    });
                }

                if (meds.length===0) {
                    this.showNotification('Please add at least one medicine.', 'error');
                    return;
                }

                // Restore old stock if editing
                if (this.editingId) {
                    const existing = this.prescriptions.find(p=>p.id===this.editingId);
                    if (existing && existing.medicinesList) {
                        existing.medicinesList.forEach(m=>{
                            const inv = this.inventory.find(i=>i.id===m.medicineId);
                            if (inv) inv.stock += m.quantity;
                        });
                    }
                }

                // Deduct new stock
                meds.forEach(m=>{
                    const inv = this.inventory.find(i=>i.id===m.medicineId);
                    if (inv) inv.stock -= m.quantity;
                });

                // Printable string
                const medicinesString = meds.map(m=>`${m.name} - ${m.dosage}, ${m.duration}, Qty: ${m.quantity}`).join('\\n');

                const prescData = {
                    patientName,
                    patientId,
                    diagnosis,
                    notes,
                    medicines: medicinesString,
                    medicinesList: meds,
                    doctor: this.currentUser.name,
                    date: new Date().toISOString().split('T')[0]
                };

                if (this.editingId) {
                    const ix = this.prescriptions.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.prescriptions[ix] = { ...this.prescriptions[ix], ...prescData };
                        this.showNotification('Prescription updated successfully','success');
                    }
                } else {
                    const newPresc = { id: Date.now(), ...prescData };
                    this.prescriptions.unshift(newPresc);
                    this.showNotification('Prescription saved successfully','success');
                }

                this.saveData();
                this.closeModal();
                this.render();
            }

            printPrescription(id) {
                const p = this.prescriptions.find(pr=>pr.id===id);
                if (!p) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFontSize(20);
                doc.setTextColor(44,62,80);
                doc.text("HEALTH+ CLINIC",105,20,{align:'center'});
                doc.setFontSize(12);
                doc.setTextColor(128,128,128);
                doc.text("Aesthetic & Medical Center",105,28,{align:'center'});
                doc.text("123 Health Street, Medical City",105,35,{align:'center'});

                // Divider
                doc.setDrawColor(200,200,200);
                doc.line(10,42,200,42);

                // Prescription details

            // -----------------------------------------------------------------
            // ANALYTICS
            // -----------------------------------------------------------------
            renderAnalyticsCharts() {
                const stats = this.getStats();
                const canvas = document.getElementById('revenueChart');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Simple bar chart
                const width = canvas.width;
                const height = canvas.height;
                const margin = 40;
                const chartWidth = width - 2 * margin;
                const chartHeight = height - 2 * margin;
                
                // Find max value for scaling
                const maxValue = Math.max(...stats.revenueTrend, 1);
                
                // Draw bars
                const barWidth = chartWidth / stats.revenueTrend.length;
                ctx.fillStyle = '#4f46e5';
                
                stats.revenueTrend.forEach((value, index) => {
                    const barHeight = (value / maxValue) * chartHeight;
                    const x = margin + index * barWidth + barWidth / 4;
                    const y = height - margin - barHeight;
                    const width = barWidth / 2;
                    
                    ctx.fillRect(x, y, width, barHeight);
                    
                    // Label
                    ctx.fillStyle = '#64748b';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Rs ${value.toLocaleString()}`, x + width/2, y - 5);
                    
                    // Month label
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
                    ctx.fillText(months[(new Date().getMonth() - 5 + index) % 12], 
                                x + width/2, height - margin + 15);
                });
                
                // Axes
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(margin, height - margin);
                ctx.lineTo(width - margin, height - margin);
                ctx.stroke();
            }
