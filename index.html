<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health+ Clinic Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-in { animation: fadeIn .2s ease-out; }

        .sidebar { transition: transform .3s ease; }
        .stat-card { transition: all .3s ease; }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,.1);
        }
        .table-row:hover { background-color:#f8fafc; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
        // ======================================================================
        // ClinicApp – single‑page professional clinic manager
        // ======================================================================
        class ClinicApp {
            constructor() {
                this.currentView   = 'dashboard';
                this.currentUser   = null;
                this.isSidebarOpen = false;
                this.formData      = {};
                this.editingId     = null;
                this.searchTerm    = '';

                this.initializeData();
                this.render();
                this.bindEvents();
            }

            // -----------------------------------------------------------------
            // DATA INITIALISATION & UTILITIES
            // -----------------------------------------------------------------
            initializeData() {
                // Users
                this.users = JSON.parse(localStorage.getItem('clinic_users')) || [
                    { id: 1, username: 'admin', password: 'admin123', email: 'admin@clinic.com', role: 'Admin', name: 'Dr. John Smith' },
                    { id: 2, username: 'doctor', password: 'doctor123', email: 'doctor@clinic.com', role: 'Doctor', name: 'Dr. Sarah Johnson' },
                    { id: 3, username: 'pharmacist', password: 'pharma123', email: 'pharma@clinic.com', role: 'Pharmacist', name: 'Michael Brown' }
                ];

                // Patients
                this.patients = JSON.parse(localStorage.getItem('clinic_patients')) || [
                    { id: 1, mrNumber: 'MR-24-5837', name: 'Alice Johnson', age: 35, gender: 'Female', contact: '555-0123', address: '123 Main St', registeredAt: '2024-01-15' },
                    { id: 2, mrNumber: 'MR-24-6291', name: 'Robert Chen',   age: 42, gender: 'Male',   contact: '555-0456', address: '456 Oak Ave',   registeredAt: '2024-01-20' },
                    { id: 3, mrNumber: 'MR-24-7742', name: 'Maria Garcia',  age: 28, gender: 'Female', contact: '555-0789', address: '789 Pine Rd',   registeredAt: '2024-02-05' }
                ];

                // Appointments
                this.appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [
                    { id: 1, patientName: 'Alice Johnson',   patientId: 1, date: '2024-03-20', time: '10:00', doctor: 'Dr. Sarah Johnson',   token: 1, status: 'Completed', notes: 'Regular checkup' },
                    { id: 2, patientName: 'Robert Chen',     patientId: 2, date: '2024-03-20', time: '11:30', doctor: 'Dr. John Smith',       token: 2, status: 'Confirmed', notes: 'Follow-up appointment' },
                    { id: 3, patientName: 'Maria Garcia',    patientId: 3, date: '2024-03-21', time: '09:00', doctor: 'Dr. Sarah Johnson',   token: 1, status: 'Pending',   notes: 'Initial consultation' }
                ];

                // Inventory
                this.inventory = JSON.parse(localStorage.getItem('clinic_inventory')) || [
                    { id: 1, name: 'Panadol 500mg', type: 'Tablet',   stock: 150, price: 5,  supplier: 'PharmaCorp',   expiry: '2025-12-31' },
                    { id: 2, name: 'Augmentin 625mg',type: 'Tablet',   stock: 45,  price: 45, supplier: 'MediSupply',  expiry: '2025-08-15' },
                    { id: 3, name: 'Brufen 400mg',   type: 'Syrup',    stock: 25,  price: 120,supplier: 'HealthPlus',  expiry: '2024-11-30' },
                    { id: 4, name: 'Flagyl 400mg',   type: 'Tablet',   stock: 80,  price: 15, supplier: 'PharmaCorp',   expiry: '2026-03-20' },
                    { id: 5, name: 'Amoxil 250mg',   type: 'Capsule',  stock: 120, price: 30, supplier: 'MediSupply',  expiry: '2025-09-15' }
                ];

                // Prescriptions (legacy ones only have `medicines` string)
                this.prescriptions = JSON.parse(localStorage.getItem('clinic_prescriptions')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, doctor: 'Dr. Sarah Johnson', date: '2024-03-15', medicines: 'Panadol 500mg - 1 tablet twice daily for 5 days', diagnosis: 'Headache and fever', notes: 'Rest and hydrate well' },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, doctor: 'Dr. John Smith',    date: '2024-03-10', medicines: 'Augmentin 625mg - 1 tablet twice daily for 7 days', diagnosis: 'Respiratory infection', notes: 'Complete full course' }
                ];

                // Invoices
                this.invoices = JSON.parse(localStorage.getItem('clinic_invoices')) || [
                    { id: 1, invoiceNo: 'INV-24-001', patientName: 'Alice Johnson', patientId: 1, date: '2024-03-15', items: 'Consultation Fee, Lab Test', amount: 2500, status: 'Paid' },
                    { id: 2, invoiceNo: 'INV-24-002', patientName: 'Robert Chen',   patientId: 2, date: '2024-03-10', items: 'Consultation Fee, Medicines', amount: 1800, status: 'Pending' }
                ];

                // Lab tests
                this.labTests = JSON.parse(localStorage.getItem('clinic_lab_tests')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, testName: 'Blood Test', date: '2024-03-15', status: 'Completed', results: 'Normal ranges' },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, testName: 'X-Ray Chest', date: '2024-03-18', status: 'In Progress', results: '' }
                ];

                this.currentUser = JSON.parse(localStorage.getItem('clinic_current_user')) || null;
            }

            saveData() {
                localStorage.setItem('clinic_users',          JSON.stringify(this.users));
                localStorage.setItem('clinic_patients',      JSON.stringify(this.patients));
                localStorage.setItem('clinic_appointments',  JSON.stringify(this.appointments));
                localStorage.setItem('clinic_inventory',     JSON.stringify(this.inventory));
                localStorage.setItem('clinic_prescriptions', JSON.stringify(this.prescriptions));
                localStorage.setItem('clinic_invoices',      JSON.stringify(this.invoices));
                localStorage.setItem('clinic_lab_tests',    JSON.stringify(this.labTests));
                localStorage.setItem('clinic_current_user',  JSON.stringify(this.currentUser));
            }

            generateMR() {
                const year   = new Date().getFullYear().toString().substr(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;
            }

            generateInvoiceNo() {
                const year  = new Date().getFullYear().toString().substr(-2);
                const count = this.invoices.length + 1;
                return `INV-${year}-${count.toString().padStart(3,'0')}`;
            }

            formatCurrency(amount) {
                return `Rs ${Number(amount || 0).toLocaleString()}`;
            }

            getStats() {
                const today = new Date().toISOString().split('T')[0];
                return {
                    totalPatients:       this.patients.length,
                    todayAppointments:   this.appointments.filter(a=>a.date===today).length,
                    totalAppointments:   this.appointments.length,
                    revenue:             this.invoices.reduce((s,i)=>s+(Number(i.amount)||0),0),
                    monthlyRevenue:      this.invoices
                                         .filter(i=>new Date(i.date).getMonth()===new Date().getMonth())
                                         .reduce((s,i)=>s+(Number(i.amount)||0),0),
                    lowStock:            this.inventory.filter(i=>i.stock<50).length,
                    pendingAppointments:this.appointments.filter(a=>a.status==='Pending').length
                };
            }

            // -----------------------------------------------------------------
            // AUTH
            // -----------------------------------------------------------------
            handleLogin() {
                const username = document.getElementById('username')?.value;
                const password = document.getElementById('password')?.value;
                if (!username||!password) return;
                const user = this.users.find(u=> (u.username===username||u.email===username) && u.password===password);
                if (user) {
                    this.currentUser = user;
                    this.saveData();
                    this.render();
                } else {
                    this.showNotification('Invalid credentials! Use: admin / admin123','error');
                }
            }

            logout() {
                this.currentUser = null;
                this.saveData();
                this.render();
            }

            // -----------------------------------------------------------------
            // UI HELPERS
            // -----------------------------------------------------------------
            showModal(modalId, data=null) {
                this.editingId = data?.id || null;
                this.formData  = data ? {...data} : {};

                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                document.getElementById(modalId).classList.remove('hidden');

                // Prescription‑specific initialisation
                if (modalId==='prescription-modal') {
                    if (Array.isArray(this.formData.medicinesList)) {
                        // already an array – keep it
                    } else if (this.formData.medicines) {
                        try {
                            const maybe = JSON.parse(this.formData.medicines);
                            this.formData.medicinesList = Array.isArray(maybe) ? maybe : [];
                        } catch (e) { this.formData.medicinesList = []; }
                    } else {
                        this.formData.medicinesList = [];
                    }
                    this.renderPrescriptionMedicationRows();
                }
            }

            closeModal() {
                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                this.editingId = null;
                this.formData  = {};
            }

            showNotification(msg,type='info') {
                document.querySelectorAll('.notification').forEach(n=>n.remove());
                const n = document.createElement('div');
                n.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 notification ${
                    type==='error'   ? 'bg-red-500 text-white' :
                    type==='success' ? 'bg-green-500 text-white' :
                                      'bg-blue-500 text-white' }`;
                n.textContent = msg;
                document.body.appendChild(n);
                setTimeout(()=>n.remove(),3000);
            }

            // -----------------------------------------------------------------
            // PATIENTS
            // -----------------------------------------------------------------
            savePatient() {
                const f = document.getElementById('patient-form');
                const fd = new FormData(f);
                const data = {
                    name:    fd.get('name'),
                    age:     fd.get('age'),
                    gender:  fd.get('gender'),
                    contact: fd.get('contact'),
                    address: fd.get('address')
                };
                if (!data.name||!data.age||!data.contact) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (this.editingId) {
                    const ix = this.patients.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.patients[ix] = {...this.patients[ix],...data};
                        this.showNotification('Patient updated successfully','success');
                    }
                } else {
                    const newPatient = {
                        id: Date.now(),
                        mrNumber: this.generateMR(),
                        ...data,
                        registeredAt: new Date().toISOString().split('T')[0]
                    };
                    this.patients.unshift(newPatient);
                    this.showNotification('Patient registered successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deletePatient(id) {
                if (confirm('Are you sure you want to delete this patient?')) {
                    this.patients = this.patients.filter(p=>p.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Patient deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // APPOINTMENTS
            // -----------------------------------------------------------------
            saveAppointment() {
                const f = document.getElementById('appointment-form');
                const fd = new FormData(f);
                const data = {
                    patientId: parseInt(fd.get('patientId')),
                    date:      fd.get('date'),
                    time:      fd.get('time'),
                    doctor:    fd.get('doctor'),
                    notes:     fd.get('notes')
                };
                if (!data.patientId||!data.date||!data.time||!data.doctor) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                const pat = this.patients.find(p=>p.id===data.patientId);
                data.patientName = pat ? pat.name : 'Unknown';
                if (this.editingId) {
                    const ix = this.appointments.findIndex(a=>a.id===this.editingId);
                    if (ix!==-1) {
                        this.appointments[ix] = {...this.appointments[ix],...data};
                        this.showNotification('Appointment updated successfully','success');
                    }
                } else {
                    const token = this.appointments.filter(a=>a.date===data.date).length+1;
                    const newAppt = {
                        id: Date.now(),
                        token,
                        status: 'Pending',
                        ...data
                    };
                    this.appointments.unshift(newAppt);
                    this.showNotification('Appointment booked successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            updateAppointmentStatus(id,status) {
                const a = this.appointments.find(ap=>ap.id===id);
                if (a) {
                    a.status = status;
                    this.saveData();
                    this.render();
                    this.showNotification(`Appointment marked as ${status}`,'success');
                }
            }

            deleteAppointment(id) {
                if (confirm('Are you sure you want to delete this appointment?')) {
                    this.appointments = this.appointments.filter(a=>a.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Appointment deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // PRESCRIPTIONS (NEW STOCK‑AWARE LOGIC)
            // -----------------------------------------------------------------
            deletePrescription(id) {
                if (confirm('Are you sure you want to delete this prescription?')) {
                    this.prescriptions = this.prescriptions.filter(p=>p.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Prescription deleted successfully','success');
                }
            }

            // ----- HELPERS FOR DYNAMIC MEDICINE LIST -----
            addPrescriptionMedication(med={}) {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                const rowId = `med-row-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                const selId = med.medicineId || '';
                const qty   = med.quantity   || '';
                const row   = document.createElement('div');
                row.id      = rowId;
                row.className = 'flex items-center gap-2 mb-2';
                row.innerHTML = `
                    <select class="border rounded p-1 w-5/12 bg-white"
                            onchange="app.updatePrescriptionMedStock('${rowId}', this.value)">
                        <option value="">Select Medicine</option>
                        ${this.inventory.map(i=>`
                            <option value="${i.id}" ${i.id==selId?'selected':''}>${i.name} (${i.type})</option>
                        `).join('')}
                    </select>
                    <input type="number" class="border rounded p-1 w-24" placeholder="Qty" min="1" value="${qty}">
                    <span class="text-xs text-slate-500" id="${rowId}-stock"></span>
                    <button type="button" class="text-red-600" onclick="app.removePrescriptionMedication('${rowId}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(row);
                if (selId) this.updatePrescriptionMedStock(rowId, selId);
            }

            removePrescriptionMedication(rowId) {
                const r = document.getElementById(rowId);
                if (r) r.remove();
            }

            updatePrescriptionMedStock(rowId, medId) {
                const stockSpan = document.getElementById(`${rowId}-stock`);
                const med = this.inventory.find(i=>i.id==medId);
                stockSpan.textContent = med ? `Stock: ${med.stock}` : '';
            }

            renderPrescriptionMedicationRows() {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                container.innerHTML = '';
                const meds = this.formData.medicinesList || [];
                if (meds.length===0) {
                    this.addPrescriptionMedication();   // empty start row
                } else {
                    meds.forEach(m=>this.addPrescriptionMedication(m));
                }
            }

            // ----- SAVE PRESCRIPTION -----
            savePrescription() {
                const f        = document.getElementById('prescription-form');
                const fd       = new FormData(f);
                const patientId   = parseInt(fd.get('patientId'));
                const patientObj  = this.patients.find(p=>p.id===patientId);
                const patientName = patientObj ? patientObj.name : '';
                const diagnosis   = fd.get('diagnosis')?.trim() || '';
                const notes       = fd.get('notes')?.trim() || '';

                if (!patientName || !diagnosis) {
                    this.showNotification('Please fill in all required fields.', 'error');
                    return;
                }

                // Gather medicines
                const medRows = document.querySelectorAll('#prescription-meds-list > div');
                const meds = [];
                for (let row of medRows) {
                    const sel   = row.querySelector('select');
                    const qtyIn = row.querySelector('input');
                    const medId = parseInt(sel.value);
                    const qty   = parseInt(qtyIn.value);
                    if (!medId || isNaN(qty) || qty<=0) {
                        this.showNotification('Select a medicine and enter a valid quantity for each line.', 'error');
                        return;
                    }
                    const invItem = this.inventory.find(i=>i.id===medId);
                    if (!invItem) {
                        this.showNotification('Medicine not found in inventory.', 'error');
                        return;
                    }
                    if (qty>invItem.stock) {
                        this.showNotification(`Insufficient stock for ${invItem.name}. Available: ${invItem.stock}`, 'error');
                        return;
                    }
                    meds.push({
                        medicineId: medId,
                        name:       invItem.name,
                        type:       invItem.type,
                        quantity:   qty
                    });
                }

                if (meds.length===0) {
                    this.showNotification('Please add at least one medicine.', 'error');
                    return;
                }

                // Restore old stock if editing
                if (this.editingId) {
                    const old = this.prescriptions.find(p=>p.id===this.editingId);
                    if (old && old.medicinesList) {
                        old.medicinesList.forEach(m=>{
                            const inv = this.inventory.find(i=>i.id===m.medicineId);
                            if (inv) inv.stock += m.quantity;
                        });
                    }
                }

                // Deduct new stock
                meds.forEach(m=>{
                    const inv = this.inventory.find(i=>i.id===m.medicineId);
                    if (inv) inv.stock -= m.quantity;
                });

                // Printable string
                const medicinesString = meds.map(m=>`${m.name} - ${m.quantity} ${m.type}${m.quantity>1?'s':''}`).join('\\n');

                const prescData = {
                    patientName,
                    patientId,
                    diagnosis,
                    notes,
                    medicines: medicinesString,
                    medicinesList: meds,
                    doctor: this.currentUser.name,
                    date: new Date().toISOString().split('T')[0]
                };

                if (this.editingId) {
                    const ix = this.prescriptions.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.prescriptions[ix] = {...this.prescriptions[ix],...prescData};
                        this.showNotification('Prescription updated successfully','success');
                    }
                } else {
                    const newPresc = { id: Date.now(), ...prescData };
                    this.prescriptions.unshift(newPresc);
                    this.showNotification('Prescription saved successfully','success');
                }

                this.saveData();
                this.closeModal();
                this.render();
            }

            printPrescription(id) {
                const p = this.prescriptions.find(pr=>pr.id===id);
                if (!p) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFontSize(20);
                doc.setTextColor(44,62,80);
                doc.text('HEALTH+ CLINIC',105,20,{align:'center'});
                doc.setFontSize(12);
                doc.setTextColor(128,128,128);
                doc.text('Aesthetic & Medical Center',105,28,{align:'center'});
                doc.text('123 Health Street, Medical City',105,35,{align:'center'});

                // Divider
                doc.setDrawColor(200,200,200);
                doc.line(10,42,200,42);

                // Prescription details
                doc.setFontSize(14);
                doc.setTextColor(44,62,80);
                doc.text(`Dr. ${p.doctor}`,20,52);
                doc.text(`Date: ${p.date}`,150,52);
                doc.setFontSize(16);
                doc.text('PRESCRIPTION',105,65,{align:'center'});
                doc.setFontSize(12);
                doc.text(`Patient: ${p.patientName}`,20,75);
                doc.text(`Date: ${p.date}`,20,82);
                doc.text(`Diagnosis: ${p.diagnosis}`,20,92);
                doc.text('Medicines:',20,105);
                const lines = p.medicines.split('\\n');
                let y = 112;
                lines.forEach(l=>{
                    if (y>250){ doc.addPage(); y=20; }
                    doc.text(`• ${l}`,25,y);
                    y+=7;
                });
                if (p.notes) { y+=10; doc.text(`Notes: ${p.notes}`,20,y); }
                // Footer
                doc.setFontSize(10);
                doc.setTextColor(128,128,128);
                doc.text('This is a computer-generated prescription',105,280,{align:'center'});
                doc.save(`Prescription-${p.patientName}-${p.date}.pdf`);
                this.showNotification('Prescription PDF generated','success');
            }

            // -----------------------------------------------------------------
            // INVENTORY
            // -----------------------------------------------------------------
            saveInventory() {
                const f = document.getElementById('inventory-form');
                const fd = new FormData(f);
                const data = {
                    name:     fd.get('name'),
                    type:     fd.get('type'),
                    stock:    parseInt(fd.get('stock')),
                    price:    parseFloat(fd.get('price')),
                    supplier: fd.get('supplier'),
                    expiry:   fd.get('expiry')
                };
                if (!data.name||!data.type||!data.stock||!data.price) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (this.editingId) {
                    const ix = this.inventory.findIndex(i=>i.id===this.editingId);
                    if (ix!==-1) {
                        this.inventory[ix] = {...this.inventory[ix],...data};
                        this.showNotification('Inventory item updated successfully','success');
                    }
                } else {
                    const newItem = { id: Date.now(), ...data };
                    this.inventory.unshift(newItem);
                    this.showNotification('Inventory item added successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deleteInventory(id) {
                if (confirm('Are you sure you want to delete this inventory item?')) {
                    this.inventory = this.inventory.filter(i=>i.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Inventory item deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // INVOICES
            // -----------------------------------------------------------------
            saveInvoice() {
                const f = document.getElementById('invoice-form');
                const fd = new FormData(f);
                const data = {
                    patientName: fd.get('patientName'), // not used – keep for backward compatibility
                    patientId:   parseInt(fd.get('patientId')),
                    items:      fd.get('items'),
                    amount:     parseFloat(fd.get('amount')),
                    status:     fd.get('status')
                };
                if (!data.patientId||!data.items||!data.amount) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (this.editingId) {
                    const ix = this.invoices.findIndex(i=>i.id===this.editingId);
                    if (ix!==-1) {
                        this.invoices[ix] = {...this.invoices[ix],...data};
                        this.showNotification('Invoice updated successfully','success');
                    }
                } else {
                    const newInv = {
                        id: Date.now(),
                        invoiceNo: this.generateInvoiceNo(),
                        date: new Date().toISOString().split('T')[0],
                        ...data
                    };
                    this.invoices.unshift(newInv);
                    this.showNotification('Invoice created successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            printInvoice(id) {
                const inv = this.invoices.find(i=>i.id===id);
                if (!inv) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFontSize(20); doc.setTextColor(44,62,80);
                doc.text('HEALTH+ CLINIC',105,20,{align:'center'});
                doc.setFontSize(12); doc.setTextColor(128,128,128);
                doc.text('INVOICE',105,28,{align:'center'});

                doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text(`Invoice No: ${inv.invoiceNo}`,20,45);
                doc.text(`Date: ${inv.date}`,20,52);
                doc.text(`Patient: ${inv.patientName}`,20,59);

                doc.setDrawColor(200,200,200);
                doc.line(10,65,200,65);

                doc.setFontSize(12);
                doc.text('Description',20,75);
                doc.text('Amount',170,75,{align:'right'});
                doc.setDrawColor(200,200,200); doc.line(10,78,200,78);
                const items = inv.items.split(',');
                let y = 85;
                items.forEach(it => { doc.text(it.trim(),20,y); y+=7; });

                y+=10; doc.setDrawColor(200,200,200); doc.line(10,y,200,y);
                y+=10; doc.setFontSize(14);
                doc.text('TOTAL',20,y);
                doc.text(this.formatCurrency(inv.amount),170,y,{align:'right'});

                y+=15; doc.setFontSize(10); doc.text(`Status: ${inv.status}`,20,y);

                doc.save(`Invoice-${inv.invoiceNo}.pdf`);
                this.showNotification('Invoice PDF generated','success');
            }

            deleteInvoice(id) {
                if (confirm('Are you sure you want to delete this invoice?')) {
                    this.invoices = this.invoices.filter(i=>i.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Invoice deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // LAB
            // -----------------------------------------------------------------
            saveLabTest() {
                const f = document.getElementById('lab-form');
                const fd = new FormData(f);
                const data = {
                    patientName: fd.get('patientName'),
                    patientId:   parseInt(fd.get('patientId')),
                    testName:    fd.get('testName'),
                    date:        fd.get('date'),
                    results:     fd.get('results'),
                    status:      fd.get('status')
                };
                if (!data.patientName||!data.testName||!data.date) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (this.editingId) {
                    const ix = this.labTests.findIndex(t=>t.id===this.editingId);
                    if (ix!==-1) {
                        this.labTests[ix] = {...this.labTests[ix],...data};
                        this.showNotification('Lab test updated successfully','success');
                    }
                } else {
                    const newTest = { id: Date.now(), ...data };
                    this.labTests.unshift(newTest);
                    this.showNotification('Lab test added successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deleteLabTest(id) {
                if (confirm('Are you sure you want to delete this lab test?')) {
                    this.labTests = this.labTests.filter(t=>t.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Lab test deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // STAFF
            // -----------------------------------------------------------------
            saveStaff() {
                const f = document.getElementById('staff-form');
                const fd = new FormData(f);
                const data = {
                    name:     fd.get('name'),
                    username: fd.get('username'),
                    email:    fd.get('email'),
                    password: fd.get('password'),
                    role:     fd.get('role')
                };
                if (!data.name||!data.username||!data.email||!data.role) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (!data.password && !this.editingId) {
                    this.showNotification('Password is required for new staff','error');
                    return;
                }
                const exist = this.users.find(u=>u.username===data.username && u.id!==this.editingId);
                if (exist) { this.showNotification('Username already exists','error'); return; }

                if (this.editingId) {
                    const ix = this.users.findIndex(u=>u.id===this.editingId);
                    if (ix!==-1) {
                        if (!data.password) data.password = this.users[ix].password;
                        this.users[ix] = {...this.users[ix],...data};
                        this.showNotification('Staff member updated successfully','success');
                    }
                } else {
                    const newStaff = { id: Date.now(), ...data };
                    this.users.push(newStaff);
                    this.showNotification('Staff member added successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deleteStaff(id) {
                if (id===this.currentUser.id) {
                    this.showNotification('You cannot delete your own account','error');
                    return;
                }
                if (confirm('Are you sure you want to delete this staff member?')) {
                    this.users = this.users.filter(u=>u.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Staff member deleted successfully','success');
                }
            }

                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="inventory-form" onsubmit="event.preventDefault(); app.saveInventory();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Medicine Name *</label>
                                        <input type="text" name="name" value="${this.formData.name||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Type *</label>
                                            <select name="type" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                                <option value="Tablet" ${(this.formData.type||'Tablet')==='Tablet'?'selected':''}>Tablet</option>
                                                <option value="Capsule" ${(this.formData.type||'Tablet')==='Capsule'?'selected':''}>Capsule</option>
                                                <option value="Syrup" ${(this.formData.type||'Tablet')==='Syrup'?'selected':''}>Syrup</option>
                                                <option value="Injection" ${(this.formData.type||'Tablet')==='Injection'?'selected':''}>Injection</option>
                                                <option value="Ointment" ${(this.formData.type||'Tablet')==='Ointment'?'selected':''}>Ointment</option>
                                            </select></div>
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Stock *</label>
                                            <input type="number" name="stock" value="${this.formData.stock||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" min="0" required></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Price (Rs) *</label>
                                            <input type="number" name="price" value="${this.formData.price||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" min="0" step="0.01" required></div>
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Expiry Date</label>
                                            <input type="date" name="expiry" value="${this.formData.expiry||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
                                    </div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Supplier</label>
                                        <input type="text" name="supplier" value="${this.formData.supplier||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-teal-700 transition">${this.editingId?'Update':'Add'} Item</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Invoice Modal -->
                    <div id="invoice-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Invoice':'Create New Invoice'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="invoice-form" onsubmit="event.preventDefault(); app.saveInvoice();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Select Patient *</label>
                                        <select name="patientId" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                            <option value="">Select Patient</option>
                                            ${this.patients.map(p=>`<option value="${p.id}" ${this.formData.patientId===p.id?'selected':''}>${p.name} (${p.mrNumber})</option>`).join('')}
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Items Description *</label>
                                        <textarea name="items" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="Consultation Fee, Lab Test, Medicines, etc." required>${this.formData.items||''}</textarea></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Amount (Rs) *</label>
                                        <input type="number" name="amount" value="${this.formData.amount||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" min="0" step="0.01" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                                        <select name="status" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="Pending" ${(this.formData.status||'Pending')==='Pending'?'selected':''}>Pending</option>
                                            <option value="Paid" ${(this.formData.status||'Pending')==='Paid'?'selected':''}>Paid</option>
                                            <option value="Cancelled" ${(this.formData.status||'Pending')==='Cancelled'?'selected':''}>Cancelled</option>
                                        </select></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-orange-700 transition">${this.editingId?'Update':'Create'} Invoice</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Lab Modal -->
                    <div id="lab-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Lab Test':'New Lab Test'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="lab-form" onsubmit="event.preventDefault(); app.saveLabTest();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Select Patient *</label>
                                        <select name="patientId" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                            <option value="">Select Patient</option>
                                            ${this.patients.map(p=>`<option value="${p.id}" ${this.formData.patientId===p.id?'selected':''}>${p.name} (${p.mrNumber})</option>`).join('')}
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Test Name *</label>
                                        <input type="text" name="testName" value="${this.formData.testName||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Date *</label>
                                        <input type="date" name="date" value="${this.formData.date||new Date().toISOString().split('T')[0]}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                                        <select name="status" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="Pending" ${(this.formData.status||'Pending')==='Pending'?'selected':''}>Pending</option>
                                            <option value="In Progress" ${(this.formData.status||'Pending')==='In Progress'?'selected':''}>In Progress</option>
                                            <option value="Completed" ${(this.formData.status||'Pending')==='Completed'?'selected':''}>Completed</option>
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Results</label>
                                        <textarea name="results" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" rows="3">${this.formData.results||''}</textarea></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">${this.editingId?'Update':'Add'} Test</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Staff Modal -->
                    <div id="staff-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Staff Member':'Add New Staff Member'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="staff-form" onsubmit="event.preventDefault(); app.saveStaff();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                                        <input type="text" name="name" value="${this.formData.name||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
                                            <input type="text" name="username" value="${this.formData.username||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
                                            <input type="email" name="email" value="${this.formData.email||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    </div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Password ${this.editingId?'(leave blank to keep current)':'*'}</label>
                                        <input type="password" name="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" ${this.editingId?'':'required'}></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Role *</label>
                                        <select name="role" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                            <option value="Admin" ${(this.formData.role||'Staff')==='Admin'?'selected':''}>Admin</option>
                                            <option value="Doctor" ${(this.formData.role||'Staff')==='Doctor'?'selected':''}>Doctor</option>
                                            <option value="Pharmacist" ${(this.formData.role||'Staff')==='Pharmacist'?'selected':''}>Pharmacist</option>
                                            <option value="Staff" ${(this.formData.role||'Staff')==='Staff'?'selected':''}>Staff</option>
                                        </select></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-gray-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-gray-700 transition">${this.editingId?'Update':'Add'} Staff</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            // -----------------------------------------------------------------
            // EVENT BINDING (none needed – inline handlers used)
            // -----------------------------------------------------------------
            bindEvents() { /* No additional listeners required */ }
        }

        // Initialise the app and expose it globally for inline handlers
        const app = new ClinicApp();
        window.app = app;
    </script>
</body>
</html>
