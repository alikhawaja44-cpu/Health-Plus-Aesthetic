<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health+ Clinic Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <style>

            .no-print { display: none !important; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-in {
            animation: fadeIn 0.2s ease-out;
        }
        
        .sidebar {
            transition: transform 0.3s ease;
        }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .table-row:hover {
            background-color: #f8fafc;
        }
        
        .medicine-suggestion {
            cursor: pointer;
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .medicine-suggestion:hover {
            background-color: #f1f5f9;
        }
        
        .low-stock {
            background-color: #fef2f2;
            border-left: 4px solid #ef4444;
        }
        
        .out-of-stock {
            background-color: #fef2f2;
            border-left: 4px solid #dc2626;
            color: #dc2626;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
        // Professional Clinic Management System with Auto-Deduction Feature
        class ClinicApp {
            constructor() {
                this.currentView = 'dashboard';
                this.currentUser = null;
                this.isSidebarOpen = false;
                this.formData = {};
                this.editingId = null;
                this.searchTerm = '';
                this.medicineSuggestions = [];

                // Initialize data
                this.initializeData();
                this.render();
                this.bindEvents();
            }

                    { id: 2, mrNumber: 'MR-24-6291', name: 'Robert Chen', age: 42, gender: 'Male', contact: '555-0456', address: '456 Oak Ave', registeredAt: '2024-01-20' },
                    { id: 3, mrNumber: 'MR-24-7742', name: 'Maria Garcia', age: 28, gender: 'Female', contact: '555-0789', address: '789 Pine Rd', registeredAt: '2024-02-05' }

                // Sample appointment data
                this.appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [

                    { id: 2, patientName: 'Robert Chen', patientId: 2, date: '2024-03-20', time: '11:30', doctor: 'Dr. John Smith', token: 2, status: 'Confirmed', notes: 'Follow-up appointment' },
                    { id: 3, patientName: 'Maria Garcia', patientId: 3, date: '2024-03-21', time: '09:00', doctor: 'Dr. Sarah Johnson', token: 1, status: 'Pending', notes: 'Initial consultation' }
                ];
                
                // Inventory data
                this.inventory = JSON.parse(localStorage.getItem('clinic_inventory')) || [

                    { id: 2, name: 'Augmentin 625mg', type: 'Tablet', stock: 45, price: 45, supplier: 'MediSupply', expiry: '2025-08-15' },
                    { id: 3, name: 'Brufen 400mg', type: 'Syrup', stock: 25, price: 120, supplier: 'HealthPlus', expiry: '2024-11-30' },
                    { id: 4, name: 'Flagyl 400mg', type: 'Tablet', stock: 80, price: 15, supplier: 'PharmaCorp', expiry: '2026-03-20' },
                    { id: 5, name: 'Amoxil 250mg', type: 'Capsule', stock: 120, price: 30, supplier: 'MediSupply', expiry: '2025-09-15' },

                this.prescriptions = JSON.parse(localStorage.getItem('clinic_prescriptions')) || [

                    { id: 2, patientName: 'Robert Chen', patientId: 2, doctor: 'Dr. John Smith', date: '2024-03-10', medicines: 'Augmentin 625mg - 1 tablet twice daily for 7 days', diagnosis: 'Respiratory infection', notes: 'Complete full course' }
                ];

                    { id: 2, invoiceNo: 'INV-24-002', patientName: 'Robert Chen', patientId: 2, date: '2024-03-10', items: 'Consultation Fee, Medicines', amount: 1800, status: 'Pending' }

                    { id: 1, patientName: 'Alice Johnson', patientId: 1, testName: 'Blood Test', date: '2024-03-15', status: 'Completed', results: 'Normal ranges' },
                    { id: 2, patientName: 'Robert Chen', patientId: 2, testName: 'X-Ray Chest', date: '2024-03-18', status: 'In Progress', results: '' }

            saveData() {
                localStorage.setItem('clinic_users', JSON.stringify(this.users));
                localStorage.setItem('clinic_patients', JSON.stringify(this.patients));
                localStorage.setItem('clinic_appointments', JSON.stringify(this.appointments));
                localStorage.setItem('clinic_inventory', JSON.stringify(this.inventory));
                localStorage.setItem('clinic_prescriptions', JSON.stringify(this.prescriptions));
                localStorage.setItem('clinic_invoices', JSON.stringify(this.invoices));
                localStorage.setItem('clinic_lab_tests', JSON.stringify(this.labTests));
                localStorage.setItem('clinic_current_user', JSON.stringify(this.currentUser));
            }
            
            generateMR() {
                const year = new Date().getFullYear().toString().substr(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;
            }
            
            generateInvoiceNo() {
                const year = new Date().getFullYear().toString().substr(-2);
                const count = this.invoices.length + 1;
                return `INV-${year}-${count.toString().padStart(3, '0')}`;
            }
            
            formatCurrency(amount) {
                return `Rs ${Number(amount || 0).toLocaleString()}`;
            }
            
            getStats() {
                const today = new Date().toISOString().split('T')[0];
                return {
                    totalPatients: this.patients.length,
                    todayAppointments: this.appointments.filter(a => a.date === today).length,
                    totalAppointments: this.appointments.length,
                    revenue: this.invoices.reduce((acc, inv) => acc + (Number(inv.amount) || 0), 0),
                    monthlyRevenue: this.invoices
                        .filter(inv => new Date(inv.date).getMonth() === new Date().getMonth())
                        .reduce((acc, inv) => acc + (Number(inv.amount) || 0), 0),
                    lowStock: this.inventory.filter(i => i.stock < 50).length,
                    pendingAppointments: this.appointments.filter(a => a.status === 'Pending').length
                };
            }
            
            // NEW FEATURE: Medicine Auto-Deduction Logic
            extractMedicinesFromPrescription(prescriptionText) {
                // Simple regex to extract medicine names and quantities
                const medicineRegex = /([A-Za-z\s]+)\s*-\s*([\d]+\s*(?:tablet|capsule|mg|ml|dose).*?\s*(?:for\s+[\d]+\s*(?:days|weeks))?)/gi;
                const matches = [];
                let match;
                
                while ((match = medicineRegex.exec(prescriptionText)) !== null) {
                    const medicineName = match[1].trim();
                    const dosage = match[2].trim();
                    
                    // Find the medicine in inventory
                    const inventoryItem = this.inventory.find(item => 
                        item.name.toLowerCase().includes(medicineName.toLowerCase())
                    );
                    
                    if (inventoryItem) {
                        // Extract quantity (simple extraction - can be enhanced)
                        const quantityMatch = dosage.match(/(\d+)\s*(?:tablet|capsule|dose)/i);
                        const quantity = quantityMatch ? parseInt(quantityMatch[1]) : 1;
                        
                        // Calculate days of treatment
                        const daysMatch = dosage.match(/for\s+(\d+)\s*(?:day|week)/i);
                        const days = daysMatch ? parseInt(daysMatch[1]) : 1;
                        
                        // Calculate total units needed
                        const frequencyMatch = dosage.match(/(\d+)\s*times?\s*(?:a|per)\s*day/i);
                        const frequency = frequencyMatch ? parseInt(frequencyMatch[1]) : 2; // Default to twice daily
                        
                        const totalUnits = quantity * frequency * days;
                        
                        matches.push({
                            name: inventoryItem.name,
                            inventoryId: inventoryItem.id,
                            dosage: dosage,
                            quantity: quantity,
                            frequency: frequency,
                            days: days,
                            totalUnits: totalUnits,
                            availableStock: inventoryItem.stock,
                            canDispense: inventoryItem.stock >= totalUnits
                        });
                    }
                }
                
                return matches;
            }
            
            // NEW FEATURE: Deduct medicines from inventory
            deductMedicinesFromInventory(medicineList) {
                const results = [];
                let allDeducted = true;
                
                for (const med of medicineList) {
                    const inventoryItem = this.inventory.find(item => item.id === med.inventoryId);
                    if (inventoryItem) {
                        if (inventoryItem.stock >= med.totalUnits) {
                            inventoryItem.stock -= med.totalUnits;
                            results.push({
                                medicine: inventoryItem.name,
                                deducted: med.totalUnits,
                                remaining: inventoryItem.stock,
                                success: true
                            });
                        } else {
                            results.push({
                                medicine: inventoryItem.name,
                                deducted: 0,
                                required: med.totalUnits,
                                available: inventoryItem.stock,
                                success: false
                            });
                            allDeducted = false;
                        }
                    }
                }
                
                if (allDeducted) {
                    this.saveData();
                }
                
                return { success: allDeducted, results: results };
            }
            
            // NEW FEATURE: Medicine auto-suggest in prescription form
            searchMedicines(query) {
                if (!query || query.length < 2) {
                    this.medicineSuggestions = [];
                    this.showSuggestions = false;
                    return;
                }
                
                const filtered = this.inventory.filter(item => 
                    item.name.toLowerCase().includes(query.toLowerCase()) &&
                    item.stock > 0
                ).slice(0, 5);
                
                this.medicineSuggestions = filtered;
                this.showSuggestions = filtered.length > 0;
            }
            
            // NEW FEATURE: Add medicine to prescription with auto-format
            addMedicineToPrescription(medicine) {
                const textarea = document.getElementById('prescription-medicines');
                const currentValue = textarea.value;
                const newEntry = `${medicine.name} - 1 ${medicine.type.toLowerCase()} twice daily for 7 days\\n`;
                
                textarea.value = currentValue ? currentValue + '\\n' + newEntry : newEntry;
                this.showSuggestions = false;
                this.medicineSuggestions = [];
                
                // Update medicine preview
                this.updateMedicinePreview();
            }
            
            // NEW FEATURE: Update medicine deduction preview
            updateMedicinePreview() {
                const prescriptionText = document.getElementById('prescription-medicines').value;
                const extractedMedicines = this.extractMedicinesFromPrescription(prescriptionText);
                const previewContainer = document.getElementById('medicine-preview');
                
                if (!previewContainer) return;
                
                if (extractedMedicines.length === 0) {
                    previewContainer.innerHTML = '<p class="text-slate-500 text-sm">No medicines detected yet. Use the format: "Medicine Name - Dosage Instructions"</p>';
                    return;
                }
                
                let previewHTML = '<div class="space-y-2">';
                let totalMedicinesCost = 0;
                
                extractedMedicines.forEach(med => {
                    const inventoryItem = this.inventory.find(item => item.id === med.inventoryId);
                    const medicineCost = inventoryItem ? (inventoryItem.price * med.totalUnits) : 0;
                    totalMedicinesCost += medicineCost;
                    
                    previewHTML += `
                        <div class="p-3 rounded-lg border ${med.canDispense ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-medium ${med.canDispense ? 'text-green-800' : 'text-red-800'}">${med.name}</h4>
                                    <p class="text-sm text-slate-600">${med.dosage}</p>
                                    <p class="text-xs text-slate-500">Total units needed: ${med.totalUnits}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-sm font-medium ${med.canDispense ? 'text-green-700' : 'text-red-700'}">
                                        ${med.canDispense ? 'Available' : 'Low Stock'}
                                    </span>
                                    <p class="text-xs text-slate-500">Stock: ${med.availableStock}</p>
                                </div>
                            </div>
                            ${!med.canDispense ? `
                                <div class="mt-2 p-2 bg-red-100 rounded text-red-700 text-xs">
                                    <i class="fas fa-exclamation-triangle mr-1"></i>
                                    Not enough stock to fulfill this prescription
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                previewHTML += `
                    <div class="mt-4 p-3 bg-blue-50 rounded-lg border border-blue-200">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-blue-800">Estimated Medicines Cost</span>
                            <span class="font-bold text-blue-700">${this.formatCurrency(totalMedicinesCost)}</span>
                        </div>
                    </div>
                `;
                
                previewHTML += '</div>';
                previewContainer.innerHTML = previewHTML;
            }
            
            handleLogin() {
                const username = document.getElementById('username')?.value;
                const password = document.getElementById('password')?.value;
                
                if (!username || !password) return;
                
                const user = this.users.find(u => 
                    (u.username === username || u.email === username) && u.password === password
                );
                
                if (user) {
                    this.currentUser = user;
                    this.saveData();
                    this.render();
                } else {
                    this.showNotification('Invalid credentials! Use: admin / admin123', 'error');
                }
            }
            
            logout() {
                this.currentUser = null;
                this.saveData();
                this.render();
            }
            
            showModal(modalId, data = null) {
                this.editingId = data?.id || null;
                this.formData = data ? {...data} : {};
                this.medicineSuggestions = [];
                this.showSuggestions = false;
                
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.classList.add('hidden');
                });
                document.getElementById(modalId).classList.remove('hidden');
                
                // Initialize medicine preview if it's a prescription modal
                if (modalId === 'prescription-modal') {
                    setTimeout(() => {
                        this.updateMedicinePreview();
                    }, 100);
                }
            }
            
            closeModal() {
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.classList.add('hidden');
                });
                this.editingId = null;
                this.formData = {};
                this.medicineSuggestions = [];
                this.showSuggestions = false;
            }
            
            showNotification(message, type = 'info') {
                // Remove existing notifications
                document.querySelectorAll('.notification').forEach(n => n.remove());
                
                const notification = document.createElement('div');
                notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 notification ${
                    type === 'error' ? 'bg-red-500 text-white' : 
                    type === 'success' ? 'bg-green-500 text-white' : 
                    'bg-blue-500 text-white'
                }`;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 3000);
            }
            
            // Enhanced Prescription Management with Auto-Deduction
            savePrescription() {
                const form = document.getElementById('prescription-form');
                const formData = new FormData(form);
                
                const prescriptionData = {
                    patientName: formData.get('patientName'),
                    patientId: parseInt(formData.get('patientId')),
                    diagnosis: formData.get('diagnosis'),
                    medicines: formData.get('medicines'),
                    notes: formData.get('notes')
                };
                
                if (!prescriptionData.patientName || !prescriptionData.diagnosis || !prescriptionData.medicines) {
                    this.showNotification('Please fill in all required fields', 'error');
                    return;
                }
                
                // NEW: Extract medicines and attempt deduction
                const extractedMedicines = this.extractMedicinesFromPrescription(prescriptionData.medicines);
                const deductionResult = this.deductMedicinesFromInventory(extractedMedicines);
                
                // Store deduction info with prescription
                prescriptionData.medicinesDeducted = deductionResult.success;
                prescriptionData.deductionDetails = deductionResult.results;
                prescriptionData.extractedMedicines = extractedMedicines;
                
                if (this.editingId) {
                    // Update existing prescription
                    const index = this.prescriptions.findIndex(p => p.id === this.editingId);
                    if (index !== -1) {
                        this.prescriptions[index] = { ...this.prescriptions[index], ...prescriptionData };
                        this.showNotification('Prescription updated successfully', 'success');
                    }
                } else {
                    // Add new prescription
                    const newPrescription = {
                        id: Date.now(),
                        doctor: this.currentUser.name,
                        date: new Date().toISOString().split('T')[0],
                        ...prescriptionData
                    };
                    this.prescriptions.unshift(newPrescription);
                    
                    // Show deduction result
                    if (deductionResult.success) {
                        this.showNotification('Prescription saved and medicines deducted from inventory', 'success');
                    } else {
                        const failedMeds = deductionResult.results.filter(r => !r.success).map(r => r.medicine).join(', ');
                        this.showNotification(`Prescription saved but some medicines couldn't be deducted: ${failedMeds}`, 'error');
                    }
                }
                
                this.saveData();
                this.closeModal();
                this.render();
            }
            
            // Enhanced Prescription Printing with Stock Information
            printPrescription(id) {
                const prescription = this.prescriptions.find(p => p.id === id);
                if (!prescription) return;
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Header
                doc.setFontSize(20);
                doc.setTextColor(44, 62, 80);
                doc.text("HEALTH+ CLINIC", 105, 20, { align: 'center' });
                doc.setFontSize(12);
                doc.setTextColor(128, 128, 128);
                doc.text("Aesthetic & Medical Center", 105, 28, { align: 'center' });
                doc.text("123 Health Street, Medical City", 105, 35, { align: 'center' });
                
                // Line separator
                doc.setDrawColor(200, 200, 200);
                doc.line(10, 42, 200, 42);
                
                // Prescription details
                doc.setFontSize(14);
                doc.setTextColor(44, 62, 80);
                doc.text(`Dr. ${prescription.doctor}`, 20, 52);
                doc.text(`Date: ${prescription.date}`, 150, 52);
                
                doc.setFontSize(16);
                doc.text("PRESCRIPTION", 105, 65, { align: 'center' });
                
                // Patient info
                doc.setFontSize(12);
                doc.text(`Patient: ${prescription.patientName}`, 20, 75);
                doc.text(`Diagnosis: ${prescription.diagnosis}`, 20, 82);
                
                // NEW: Stock status note
                if (prescription.medicinesDeducted) {
                    doc.setTextColor(34, 139, 34); // Green color
                    doc.text("✓ Medicines deducted from pharmacy stock", 20, 92);
                    doc.setTextColor(0, 0, 0); // Reset color
                } else if (prescription.deductionDetails) {
                    doc.setTextColor(220, 53, 69); // Red color
                    doc.text("⚠ Some medicines were not available in stock", 20, 92);
                    doc.setTextColor(0, 0, 0); // Reset color
                }
                
                // Medicines
                doc.setFontSize(12);
                doc.text("Medicines:", 20, 105);
                const medicines = prescription.medicines.split('\n');
                let yPosition = 112;
                medicines.forEach(med => {
                    if (yPosition > 250) {
                        doc.addPage();
                        yPosition = 20;
                    }
                    doc.text(`• ${med}`, 25, yPosition);
                    yPosition += 7;
                });
                
                // NEW: Medicine deduction details
                if (prescription.deductionDetails && prescription.deductionDetails.length > 0) {
                    yPosition += 10;
                    doc.setFontSize(10);
                    doc.setTextColor(128, 128, 128);
                    doc.text("Inventory Status:", 20, yPosition);
                    yPosition += 7;
                    
                    prescription.deductionDetails.forEach(detail => {
                        if (yPosition > 270) {
                            doc.addPage();
                            yPosition = 20;
                        }
                        const status = detail.success ? '✓ Deducted' : '✗ Not available';
                        doc.text(`• ${detail.medicine}: ${status}`, 25, yPosition);
                        yPosition += 5;
                    });
                }
                
                // Notes
                if (prescription.notes) {
                    yPosition += 10;
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(12);
                    doc.text(`Notes: ${prescription.notes}`, 20, yPosition);
                }
                
                // Footer
                doc.setFontSize(10);
                doc.setTextColor(128, 128, 128);
                doc.text("This is a computer-generated prescription", 105, 280, { align: 'center' });
                
                doc.save(`Prescription-${prescription.patientName}-${prescription.date}.pdf`);
                this.showNotification('Prescription PDF generated', 'success');
            }
            
            // Patient Management
            savePatient() {
                const form = document.getElementById('patient-form');
                const formData = new FormData(form);
                
                const patientData = {
                    name: formData.get('name'),
                    age: formData.get('age'),
                    gender: formData.get('gender'),
                    contact: formData.get('contact'),
                    address: formData.get('address')
                };
                
                if (!patientData.name || !patientData.age || !patientData.contact) {
                    this.showNotification('Please fill in all required fields', 'error');
                    return;
                }
                
                if (this.editingId) {
                    // Update existing patient
                    const index = this.patients.findIndex(p => p.id === this.editingId);
                    if (index !== -1) {
                        this.patients[index] = { ...this.patients[index], ...patientData };
                        this.showNotification('Patient updated successfully', 'success');
                    }
                } else {
                    // Add new patient
                    const newPatient = {
                        id: Date.now(),
                        mrNumber: this.generateMR(),
                        ...patientData,
                        registeredAt: new Date().toISOString().split('T')[0]
                    };
                    this.patients.unshift(newPatient);
                    this.showNotification('Patient registered successfully', 'success');
                }
                
                this.saveData();
                this.closeModal();
                this.render();
            }

            // Enhanced Prescription Modal Rendering
            renderPrescriptionModal() {
                return `
                    <div id="prescription-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId ? 'Edit Prescription' : 'New Prescription'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="prescription-form" onsubmit="event.preventDefault(); app.savePrescription();">
                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-slate-700 mb-1">Select Patient *</label>
                                            <select name="patientId" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                                <option value="">Select Patient</option>
                                                ${this.patients.map(p => `
                                                    <option value="${p.id}" ${this.formData.patientId === p.id ? 'selected' : ''}>${p.name} (${p.mrNumber})</option>
                                                `).join('')}
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-slate-700 mb-1">Diagnosis *</label>
                                            <input type="text" name="diagnosis" value="${this.formData.diagnosis || ''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                        </div>
                                        <div class="relative">
                                            <label class="block text-sm font-medium text-slate-700 mb-1">Medicines & Dosage *</label>
                                            <textarea 
                                                id="prescription-medicines" 
                                                name="medicines" 
                                                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                                rows="6" 
                                                placeholder="Enter each medicine on a new line. Use format: Medicine Name - Dosage Instructions
Example: Panadol 500mg - 1 tablet twice daily for 5 days
Augmentin 625mg - 1 tablet every 12 hours for 7 days"
                                                oninput="app.updateMedicinePreview()"
                                                onkeyup="app.searchMedicines(this.value.split('\\n').pop().split('-')[0]?.trim() || '')"
                                                required
                                            >${this.formData.medicines || ''}</textarea>
                                            
                                            <!-- Medicine Suggestions Dropdown -->
                                            ${this.showSuggestions ? `
                                                <div class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-60 overflow-y-auto">
                                                    ${this.medicineSuggestions.map(med => `
                                                        <div class="medicine-suggestion" onclick="app.addMedicineToPrescription(${JSON.stringify(med).replace(/"/g, '&quot;')})">
                                                            <div class="font-medium">${med.name}</div>
                                                            <div class="text-xs text-slate-500">Stock: ${med.stock} | ${med.type} | ${this.formatCurrency(med.price)}</div>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-slate-700 mb-1">Additional Notes</label>
                                            <textarea name="notes" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" rows="3">${this.formData.notes || ''}</textarea>
                                        </div>
                                    </div>
                                    
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-slate-700 mb-2">Medicine Stock Preview</label>
                                            <div id="medicine-preview" class="border border-slate-200 rounded-lg p-4 bg-slate-50 min-h-[200px]">
                                                <p class="text-slate-500 text-sm">Start typing medicines to see stock availability...</p>
                                            </div>
                                        </div>
                                        
                                        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                                            <div class="flex items-start">
                                                <i class="fas fa-lightbulb text-yellow-500 mt-1 mr-2"></i>
                                                <div>
                                                    <h4 class="font-medium text-yellow-800">Prescription Format Guide</h4>
                                                    <ul class="text-xs text-yellow-700 mt-1 space-y-1">
                                                        <li>• Medicine Name - Dosage (e.g., "Panadol 500mg - 1 tablet twice daily for 5 days")</li>
                                                        <li>• Each medicine on a new line</li>
                                                        <li>• Stock will be automatically deducted when saved</li>
                                                        <li>• Red highlights indicate insufficient stock</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex justify-end pt-6 gap-3">
                                    <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                    <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 transition">${this.editingId ? 'Update' : 'Save'} Prescription</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }
            
            // Enhanced Pharmacy View with Prescription Impact
            renderPharmacy() {
                const lowStockItems = this.inventory.filter(i => i.stock < 50);
                const recentlyDeducted = this.prescriptions
                    .filter(p => p.medicinesDeducted && new Date(p.date) > new Date(Date.now() - 7 * 24 * 60 * 60 * 1000))
                    .slice(0, 5);
                
                return `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-slate-700">Pharmacy Inventory</h3>
                                ${lowStockItems.length > 0 ? `
                                    <p class="text-sm text-red-600 mt-1">
                                        <i class="fas fa-exclamation-triangle"></i> ${lowStockItems.length} items need restocking
                                    </p>
                                ` : ''}
                            </div>
                            <button onclick="app.showModal('inventory-modal')" class="bg-teal-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-teal-700 transition flex items-center gap-2">
                                <i class="fas fa-pills"></i> Add Stock
                            </button>
                        </div>
                        
                        <!-- Recent Deductions -->
                        ${recentlyDeducted.length > 0 ? `
                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <h4 class="font-medium text-blue-800 mb-2 flex items-center">
                                    <i class="fas fa-history mr-2"></i> Recent Prescription Deductions
                                </h4>
                                <div class="space-y-2">
                                    ${recentlyDeducted.map(prescription => `
                                        <div class="text-sm text-blue-700">
                                            <span class="font-medium">${prescription.patientName}</span> - 
                                            ${prescription.date} - 
                                            ${prescription.extractedMedicines?.length || 0} medicines dispensed
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            ${this.inventory.length > 0 ? `
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left">
                                        <thead class="bg-slate-50 text-slate-600 text-sm font-semibold border-b border-slate-200">
                                            <tr>
                                                <th class="p-4">Medicine</th>
                                                <th class="p-4">Type</th>
                                                <th class="p-4">Stock</th>
                                                <th class="p-4">Price</th>
                                                <th class="p-4">Supplier</th>
                                                <th class="p-4">Expiry</th>
                                                <th class="p-4 text-center">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            ${this.inventory.map(item => {
                                                const stockClass = item.stock < 10 ? 'out-of-stock' : item.stock < 50 ? 'low-stock' : '';
                                                return `
                                                    <tr class="table-row ${stockClass}">
                                                        <td class="p-4 font-medium">${item.name}</td>
                                                        <td class="p-4 text-slate-500">${item.type}</td>
                                                        <td class="p-4 font-bold ${item.stock < 50 ? 'text-red-600' : 'text-green-600'}">
                                                            ${item.stock} units
                                                            ${item.stock < 50 ? '<i class="fas fa-exclamation-triangle ml-1"></i>' : ''}
                                                        </td>
                                                        <td class="p-4">${this.formatCurrency(item.price)}</td>
                                                        <td class="p-4 text-slate-500">${item.supplier}</td>
                                                        <td class="p-4 text-slate-500 text-sm">${item.expiry}</td>
                                                        <td class="p-4 text-center">
                                                            <div class="flex justify-center gap-2">
                                                                <button onclick="app.showModal('inventory-modal', ${JSON.stringify(item).replace(/"/g, '&quot;')})" class="p-2 text-teal-600 hover:bg-teal-50 rounded" title="Edit">
                                                                    <i class="fas fa-edit"></i>
                                                                </button>
                                                                <button onclick="app.deleteInventory(${item.id})" class="p-2 text-red-600 hover:bg-red-50 rounded" title="Delete">
                                                                    <i class="fas fa-trash"></i>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            ` : `
                                <div class="p-8 text-center text-slate-500">
                                    <i class="fas fa-pills text-4xl text-slate-300 mb-3"></i>
                                    <p>No inventory items found</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }
            
            // Updated renderModals method to use new prescription modal
            renderModals() {
                const baseModals = `
                    <!-- Patient Modal -->
                    <div id="patient-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... patient modal content (same as before) ... -->
                    </div>
                    
                    <!-- Appointment Modal -->
                    <div id="appointment-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... appointment modal content (same as before) ... -->
                    </div>
                    
                    ${this.renderPrescriptionModal()}
                    
                    <!-- Inventory Modal -->
                    <div id="inventory-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... inventory modal content (same as before) ... -->
                    </div>
                    
                    <!-- Invoice Modal -->
                    <div id="invoice-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... invoice modal content (same as before) ... -->
                    </div>
                    
                    <!-- Laboratory Modal -->
                    <div id="lab-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... lab modal content (same as before) ... -->
                    </div>
                    
                    <!-- Staff Modal -->
                    <div id="staff-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <!-- ... staff modal content (same as before) ... -->
                    </div>
                `;
                
                return baseModals;
            }
            
            // The rest of the methods remain the same as in the previous version
            // [All other methods unchanged]
            
            bindEvents() {
                // Close suggestions when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#prescription-medicines')) {
                        this.showSuggestions = false;
                    }
                });
            }
        }

        // Initialize the app
        const app = new ClinicApp();
        
        // Make app globally available for event handlers
        window.app = app;
    </script>
</body>
</html>
