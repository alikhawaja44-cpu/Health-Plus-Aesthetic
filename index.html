<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health+ Clinic Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,.1);
        }
        .table-row:hover { background-color:#f8fafc; }
        
        /* Dark mode styles */

        .dark .text-slate-500 { color: #a0aec0 !important; }
        .dark .border-slate-200 { border-color: #4a5568 !important; }
        .dark .bg-slate-50 { background-color: #1a1a1a !important; }

        .dark .border-slate-100 { border-color: #4a5568 !important; }

        .dark .text-slate-700 { color: #e2e8f0 !important; }
        .dark .text-blue-600 { color: #3b82f6 !important; }
        .dark .text-red-600 { color: #f56565 !important; }
        .dark .text-green-600 { color: #4ade80 !important; }
        .dark .bg-slate-100 { background-color: #374151 !important; }
        .dark .bg-slate-50 { background-color: #1e293b !important; }
        .dark .bg-blue-100 { background-color: #1d4ed8 !important; }
        .dark .bg-green-100 { background-color: #166534 !important; }
        .dark .bg-yellow-100 { background-color: #854d0e !important; }
        .dark .bg-red-100 { background-color: #b91c1c !important; }
        .dark .bg-purple-100 { background-color: #6d28d9 !important; }
        .dark .bg-gray-100 { background-color: #4b5563 !important; }
        .dark .text-blue-700 { color: #3b82f6 !important; }
        .dark .text-green-700 { color: #4ade80 !important; }
        .dark .text-yellow-700 { color: #f59e0b !important; }
        .dark .text-red-700 { color: #f56565 !important; }
        .dark .text-purple-700 { color: #a855f7 !important; }

        .dark .hover\\:bg-green-50:hover { background-color: #16a34a !important; }
        .dark .hover\\:bg-red-50:hover { background-color: #b91c1c !important; }
        .dark .hover\\:bg-orange-50:hover { background-color: #f59e0b !important; }
        .dark .hover\\:bg-teal-50:hover { background-color: #0d9488 !important; }
        .dark .hover\\:bg-indigo-50:hover { background-color: #4f46e5 !important; }
        .dark .hover\\:bg-gray-50:hover { background-color: #4b5563 !important; }
        .dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,.05) !important; }
        .dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05) !important; }
        
        /* Dark mode chart colors */
        .dark .chartjs-canvas {
            background-color: #2d3748 !important;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
        // ======================================================================
        // ClinicApp – complete single‑page clinic manager (v2.1)
        // ======================================================================
        class ClinicApp {
            constructor() {
                this.currentView   = 'dashboard';
                this.currentUser   = null;
                this.isSidebarOpen = false;
                this.formData      = {};
                this.editingId     = null;
                this.searchTerm    = '';
                this.darkMode      = localStorage.getItem('clinic_dark_mode') === 'true';

                // Initialise / load data
                this.initializeData();
                this.render();
                this.bindEvents();
            }

            // -----------------------------------------------------------------
            // DATA INITIALISATION & UTILITIES
            // -----------------------------------------------------------------
            initializeData() {
                // Users
                this.users = JSON.parse(localStorage.getItem('clinic_users')) || [
                    { id: 1, username: 'admin', password: 'admin123', email: 'admin@clinic.com', role: 'Admin', name: 'Dr. John Smith', avatar: 'J' },
                    { id: 2, username: 'doctor', password: 'doctor123', email: 'doctor@clinic.com', role: 'Doctor', name: 'Dr. Sarah Johnson', avatar: 'S' },
                    { id: 3, username: 'pharmacist', password: 'pharma123', email: 'pharma@clinic.com', role: 'Pharmacist', name: 'Michael Brown', avatar: 'M' },
                    { id: 4, username: 'nurse', password: 'nurse123', email: 'nurse@clinic.com', role: 'Nurse', name: 'Emily Davis', avatar: 'E' }
                ];

                // Patients (legacy records have no doctorId/charge – those are optional)
                this.patients = JSON.parse(localStorage.getItem('clinic_patients')) || [
                    { id: 1, mrNumber: 'MR-24-5837', name: 'Alice Johnson', age: 35, gender: 'Female', contact: '555-0123', address: '123 Main St', registeredAt: '2024-01-15', doctorId: 2, charge: 1500 },
                    { id: 2, mrNumber: 'MR-24-6291', name: 'Robert Chen',   age: 42, gender: 'Male',   contact: '555-0456', address: '456 Oak Ave',   registeredAt: '2024-01-20', doctorId: 1, charge: 2000 },
                    { id: 3, mrNumber: 'MR-24-7742', name: 'Maria Garcia',  age: 28, gender: 'Female', contact: '555-0789', address: '789 Pine Rd',   registeredAt: '2024-02-05', doctorId: 2, charge: 1800 },
                    { id: 4, mrNumber: 'MR-24-8321', name: 'David Wilson',  age: 54, gender: 'Male',   contact: '555-1234', address: '321 Elm St',    registeredAt: '2024-03-01', doctorId: 1, charge: 2500 }
                ];

                // Appointments
                this.appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [
                    { id: 1, patientName: 'Alice Johnson',   patientId: 1, date: '2024-03-20', time: '10:00', doctor: 'Dr. Sarah Johnson', token: 1, status: 'Completed', notes: 'Regular checkup', priority: 'Normal' },
                    { id: 2, patientName: 'Robert Chen',     patientId: 2, date: '2024-03-20', time: '11:30', doctor: 'Dr. John Smith', token: 2, status: 'Confirmed', notes: 'Follow-up appointment', priority: 'High' },
                    { id: 3, patientName: 'Maria Garcia',    patientId: 3, date: '2024-03-21', time: '09:00', doctor: 'Dr. Sarah Johnson', token: 1, status: 'Pending',   notes: 'Initial consultation', priority: 'Normal' },
                    { id: 4, patientName: 'David Wilson',    patientId: 4, date: '2024-03-22', time: '14:00', doctor: 'Dr. John Smith', token: 1, status: 'Pending',   notes: 'Annual physical', priority: 'Urgent' }
                ];

                // Inventory
                this.inventory = JSON.parse(localStorage.getItem('clinic_inventory')) || [
                    { id: 1, name: 'Panadol 500mg', type: 'Tablet',   stock: 150, price: 5,  supplier: 'PharmaCorp',   expiry: '2025-12-31', lowStockThreshold: 30 },
                    { id: 2, name: 'Augmentin 625mg',type: 'Tablet',   stock: 45,  price: 45, supplier: 'MediSupply',  expiry: '2025-08-15', lowStockThreshold: 20 },
                    { id: 3, name: 'Brufen 400mg',   type: 'Syrup',    stock: 25,  price: 120,supplier: 'HealthPlus',  expiry: '2024-11-30', lowStockThreshold: 15 },
                    { id: 4, name: 'Flagyl 400mg',   type: 'Tablet',   stock: 80,  price: 15, supplier: 'PharmaCorp',   expiry: '2026-03-20', lowStockThreshold: 25 },
                    { id: 5, name: 'Amoxil 250mg',   type: 'Capsule',  stock: 120, price: 30, supplier: 'MediSupply',  expiry: '2025-09-15', lowStockThreshold: 30 },
                    { id: 6, name: 'Paracetamol 500mg', type: 'Tablet', stock: 10, price: 2, supplier: 'HealthPlus', expiry: '2024-10-15', lowStockThreshold: 10 }
                ];

                // Prescriptions (legacy have only a medicines string)
                this.prescriptions = JSON.parse(localStorage.getItem('clinic_prescriptions')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, doctor: 'Dr. Sarah Johnson', date: '2024-03-15', medicines: 'Panadol 500mg - 1 tablet twice daily for 5 days', diagnosis: 'Headache and fever', notes: 'Rest and hydrate well', medicinesList: [{ medicineId: 1, name: 'Panadol 500mg', type: 'Tablet', quantity: 10 }] },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, doctor: 'Dr. John Smith',    date: '2024-03-10', medicines: 'Augmentin 625mg - 1 tablet twice daily for 7 days', diagnosis: 'Respiratory infection', notes: 'Complete full course', medicinesList: [{ medicineId: 2, name: 'Augmentin 625mg', type: 'Tablet', quantity: 14 }] }
                ];

                // Invoices
                this.invoices = JSON.parse(localStorage.getItem('clinic_invoices')) || [
                    { id: 1, invoiceNo: 'INV-24-001', patientName: 'Alice Johnson', patientId: 1, date: '2024-03-15', items: 'Consultation Fee, Lab Test', amount: 2500, status: 'Paid' },
                    { id: 2, invoiceNo: 'INV-24-002', patientName: 'Robert Chen',   patientId: 2, date: '2024-03-10', items: 'Consultation Fee, Medicines', amount: 1800, status: 'Pending' },
                    { id: 3, invoiceNo: 'INV-24-003', patientName: 'Maria Garcia',  patientId: 3, date: '2024-03-18', items: 'Consultation Fee', amount: 1800, status: 'Pending' }
                ];

                // Lab tests
                this.labTests = JSON.parse(localStorage.getItem('clinic_lab_tests')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, testName: 'Blood Test', date: '2024-03-15', status: 'Completed', results: 'Normal ranges', price: 500 },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, testName: 'X-Ray Chest', date: '2024-03-18', status: 'In Progress', results: '', price: 800 },
                    { id: 3, patientName: 'David Wilson',  patientId: 4, testName: 'ECG', date: '2024-03-22', status: 'Pending', results: '', price: 300 }
                ];

                // Petty Cash
                this.pettyCash = JSON.parse(localStorage.getItem('clinic_petty_cash')) || [
                    { id: 1, date: '2024-03-10', amount: 250, category: 'Office Supplies', description: 'Pens, paper, and notebooks', addedBy: 'Dr. John Smith' },
                    { id: 2, date: '2024-03-15', amount: 150, category: 'Maintenance', description: 'Light bulb replacement', addedBy: 'Dr. Sarah Johnson' },
                    { id: 3, date: '2024-03-18', amount: 450, category: 'Office Supplies', description: 'Printer toner', addedBy: 'Dr. John Smith' }
                ];

                // Add new appointments for better demonstration
                const today = new Date();
                const todayStr = today.toISOString().split('T')[0];
                if (!this.appointments.some(a => a.date === todayStr)) {
                    this.appointments.push({
                        id: Date.now(),
                        patientName: 'New Patient',
                        patientId: 1,
                        date: todayStr,
                        time: '15:30',
                        doctor: 'Dr. John Smith',
                        token: this.appointments.filter(a => a.date === todayStr).length + 1,
                        status: 'Pending',
                        notes: 'New appointment',
                        priority: 'Normal'
                    });
                }

                this.currentUser = JSON.parse(localStorage.getItem('clinic_current_user')) || null;
            }

            saveData() {
                localStorage.setItem('clinic_users',          JSON.stringify(this.users));
                localStorage.setItem('clinic_patients',      JSON.stringify(this.patients));
                localStorage.setItem('clinic_appointments',  JSON.stringify(this.appointments));
                localStorage.setItem('clinic_inventory',     JSON.stringify(this.inventory));
                localStorage.setItem('clinic_prescriptions', JSON.stringify(this.prescriptions));
                localStorage.setItem('clinic_invoices',      JSON.stringify(this.invoices));
                localStorage.setItem('clinic_lab_tests',     JSON.stringify(this.labTests));
                localStorage.setItem('clinic_petty_cash',    JSON.stringify(this.pettyCash));
                localStorage.setItem('clinic_current_user',  JSON.stringify(this.currentUser));
                localStorage.setItem('clinic_dark_mode',     this.darkMode);
            }

            generateMR() {
                const year   = new Date().getFullYear().toString().substr(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;
            }

            generateInvoiceNo() {
                const year  = new Date().getFullYear().toString().substr(-2);
                const count = this.invoices.length + 1;
                return `INV-${year}-${count.toString().padStart(3,'0')}`;
            }

            formatCurrency(amount) {
                return `Rs ${Number(amount||0).toLocaleString()}`;
            }

            getStats() {
                const today = new Date().toISOString().split('T')[0];
                const month = new Date().getMonth();
                const year = new Date().getFullYear();
                
                // Calculate lab revenue
                const labRevenue = this.labTests.reduce((sum, test) => {
                    if (test.status === 'Completed' && test.price) {
                        return sum + Number(test.price);
                    }
                    return sum;
                }, 0);

                // Calculate petty cash
                const pettyCashTotal = this.pettyCash.reduce((sum, entry) => sum + Number(entry.amount), 0);
                
                return {
                    totalPatients:       this.patients.length,
                    todayAppointments:   this.appointments.filter(a=>a.date===today).length,
                    totalAppointments:  this.appointments.length,
                    revenue:             this.invoices.reduce((s,i)=>s+(Number(i.amount)||0),0),
                    monthlyRevenue:      this.invoices
                                         .filter(i=>new Date(i.date).getMonth()===month && new Date(i.date).getFullYear()===year)
                                         .reduce((s,i)=>s+(Number(i.amount)||0),0),
                    labRevenue:          labRevenue,
                    pettyCashTotal:      pettyCashTotal,
                    lowStock:            this.inventory.filter(i=>i.stock <= i.lowStockThreshold).length,
                    pendingAppointments: this.appointments.filter(a=>a.status==='Pending').length,
                    totalDoctors:        this.users.filter(u => u.role === 'Doctor').length,
                    totalNurses:         this.users.filter(u => u.role === 'Nurse').length,
                    totalPharmacists:    this.users.filter(u => u.role === 'Pharmacist').length,
                    todayPending:        this.appointments.filter(a=>a.date===today && a.status==='Pending').length,
                    todayConfirmed:      this.appointments.filter(a=>a.date===today && a.status==='Confirmed').length,
                    todayCompleted:      this.appointments.filter(a=>a.date===today && a.status==='Completed').length,
                    urgentAppointments:  this.appointments.filter(a=>a.priority==='Urgent').length
                };
            }

            // -----------------------------------------------------------------
            // AUTHENTICATION
            // -----------------------------------------------------------------
            handleLogin() {
                const username = document.getElementById('username')?.value;
                const password = document.getElementById('password')?.value;
                if (!username || !password) {
                    this.showNotification('Please enter both username and password','error');
                    return;
                }

                const user = this.users.find(u =>
                    (u.username===username || u.email===username) && u.password===password
                );
                if (user) {
                    this.currentUser = user;
                    this.saveData();
                    this.render();
                } else {
                    this.showNotification('Invalid credentials!','error');
                }
            }

            logout() {
                this.currentUser = null;
                this.saveData();
                this.render();
            }

            // -----------------------------------------------------------------
            // UI HELPERS (modal handling, notifications, etc.)
            // -----------------------------------------------------------------
            showModal(modalId, data=null) {
                this.editingId = data?.id || null;
                this.formData  = data ? {...data} : {};

                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                document.getElementById(modalId).classList.remove('hidden');

                // Prescription‑specific initialisation (dynamic medicine selector)
                if (modalId==='prescription-modal') {
                    if (Array.isArray(this.formData.medicinesList)) {
                        // already an array – keep it
                    } else if (this.formData.medicines) {
                        try {
                            const maybe = JSON.parse(this.formData.medicines);
                            this.formData.medicinesList = Array.isArray(maybe) ? maybe : [];
                        } catch (e) { this.formData.medicinesList = []; }
                    } else {
                        this.formData.medicinesList = [];
                    }
                    this.renderPrescriptionMedicationRows();
                }
            }

            closeModal() {
                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                this.editingId = null;
                this.formData  = {};
            }

            showNotification(msg,type='info') {
                document.querySelectorAll('.notification').forEach(n=>n.remove());
                const n = document.createElement('div');
                n.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 notification ${
                    type==='error'   ? 'bg-red-500 text-white' :
                    type==='success' ? 'bg-green-500 text-white' :
                                        'bg-blue-500 text-white'
                }`;
                n.textContent = msg;
                document.body.appendChild(n);
                setTimeout(()=>n.remove(),3000);
            }

            // -----------------------------------------------------------------
            // PATIENT MANAGEMENT
            // -----------------------------------------------------------------
            savePatient() {
                const f = document.getElementById('patient-form');
                const fd = new FormData(f);
                const data = {
                    name:    fd.get('name'),
                    age:     fd.get('age'),
                    gender:  fd.get('gender'),
                    contact: fd.get('contact'),
                    address: fd.get('address'),
                    doctorId: parseInt(fd.get('doctorId')),
                    charge:   parseFloat(fd.get('charge'))
                };
                // basic validation
                if (!data.name || !data.age || !data.contact) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (isNaN(data.doctorId) || isNaN(data.charge)) {
                    this.showNotification('Please select a doctor and enter a valid charge','error');
                    return;
                }

                if (this.editingId) {
                    // update existing patient
                    const ix = this.patients.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.patients[ix] = { ...this.patients[ix], ...data };
                        this.showNotification('Patient updated successfully','success');
                    }
                } else {
                    // add new patient
                    const newPatient = {
                        id: Date.now(),
                        mrNumber: this.generateMR(),
                        ...data,
                        registeredAt: new Date().toISOString().split('T')[0]
                    };
                    this.patients.unshift(newPatient);
                    this.showNotification('Patient registered successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deletePatient(id) {
                if (confirm('Are you sure you want to delete this patient?')) {
                    this.patients = this.patients.filter(p=>p.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Patient deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // APPOINTMENTS
            // -----------------------------------------------------------------
            saveAppointment() {
                const f = document.getElementById('appointment-form');
                const fd = new FormData(f);
                const data = {
                    patientId: parseInt(fd.get('patientId')),
                    date:      fd.get('date'),
                    time:      fd.get('time'),
                    doctor:    fd.get('doctor'),
                    notes:     fd.get('notes'),
                    priority:  fd.get('priority') || 'Normal'
                };
                if (!data.patientId||!data.date||!data.time||!data.doctor) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                const pat = this.patients.find(p=>p.id===data.patientId);
                data.patientName = pat ? pat.name : 'Unknown';

                if (this.editingId) {
                    const ix = this.appointments.findIndex(a=>a.id===this.editingId);
                    if (ix!==-1) {
                        this.appointments[ix] = { ...this.appointments[ix], ...data };
                        this.showNotification('Appointment updated successfully','success');
                    }
                } else {
                    const token = this.appointments.filter(a=>a.date===data.date).length+1;
                    const newAppt = {
                        id: Date.now(),
                        token,
                        status: 'Pending',
                        ...data
                    };
                    this.appointments.unshift(newAppt);
                    this.showNotification('Appointment booked successfully','success');
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            updateAppointmentStatus(id,status) {
                const a = this.appointments.find(ap=>ap.id===id);
                if (a) {
                    a.status = status;
                    this.saveData();
                    this.render();
                    this.showNotification(`Appointment marked as ${status}`,'success');
                }
            }

            deleteAppointment(id) {
                if (confirm('Are you sure you want to delete this appointment?')) {
                    this.appointments = this.appointments.filter(a=>a.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Appointment deleted successfully','success');
                }
            }

            // -----------------------------------------------------------------
            // PRESCRIPTIONS (stock‑aware)
            // -----------------------------------------------------------------
            deletePrescription(id) {
                if (confirm('Are you sure you want to delete this prescription?')) {
                    this.prescriptions = this.prescriptions.filter(p=>p.id!==id);
                    this.saveData();
                    this.render();
                    this.showNotification('Prescription deleted successfully','success');
                }
            }

            // ----- Helpers for dynamic medicine list -----
            addPrescriptionMedication(med={}) {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                const rowId = `med-row-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                const selId = med.medicineId || '';
                const qty   = med.quantity   || '';
                const row   = document.createElement('div');
                row.id      = rowId;
                row.className = 'flex items-center gap-2 mb-2';
                row.innerHTML = `
                    <select class="border rounded p-1 w-5/12 bg-white"
                            onchange="app.updatePrescriptionMedStock('${rowId}', this.value)">
                        <option value="">Select Medicine</option>
                        ${this.inventory.map(i=>`
                            <option value="${i.id}" ${i.id==selId?'selected':''}>${i.name} (${i.type})</option>
                        `).join('')}
                    </select>
                    <input type="number" class="border rounded p-1 w-24" placeholder="Qty" min="1" value="${qty}" required>
                    <span class="text-xs text-slate-500" id="${rowId}-stock"></span>
                    <button type="button" class="text-red-600" onclick="app.removePrescriptionMedication('${rowId}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(row);
                if (selId) this.updatePrescriptionMedStock(rowId, selId);
            }

            removePrescriptionMedication(rowId) {
                const r = document.getElementById(rowId);
                if (r) r.remove();
            }

            updatePrescriptionMedStock(rowId, medId) {
                const stockSpan = document.getElementById(`${rowId}-stock`);
                const med = this.inventory.find(i=>i.id==medId);
                if (med) {
                    const threshold = med.lowStockThreshold || 30;
                    const stockClass = med.stock <= threshold ? 'text-red-600' : 'text-green-600';
                    stockSpan.textContent = `Stock: ${med.stock} (${med.stock <= threshold ? 'Low' : 'Available'})`;
                    stockSpan.className = `text-xs ${stockClass} ml-2`;
                } else {
                    stockSpan.textContent = '';
                }
            }

            renderPrescriptionMedicationRows() {

            // ----- Save prescription (with stock check) -----
            savePrescription() {
                const f = document.getElementById('prescription-form');
                const fd = new FormData(f);
                const patientId   = parseInt(fd.get('patientId'));
                const patientObj  = this.patients.find(p=>p.id===patientId);
                const patientName = patientObj ? patientObj.name : '';
                const diagnosis   = fd.get('diagnosis')?.trim() || '';
                const notes       = fd.get('notes')?.trim() || '';

                if (!patientName || !diagnosis) {
                    this.showNotification('Please fill in all required fields.', 'error');
                    return;
                }

                // Gather medicines from UI
                const medRows = document.querySelectorAll('#prescription-meds-list > div');
                const meds = [];
                let totalStockCheck = true;
                
                for (let row of medRows) {
                    const sel   = row.querySelector('select');
                    const qtyIn = row.querySelector('input');
                    const medId = parseInt(sel.value);
                    const qty   = parseInt(qtyIn.value);
                    
                    if (!medId || isNaN(qty) || qty<=0) {
                        this.showNotification('Select a medicine and enter a valid quantity for each line.', 'error');
                        totalStockCheck = false;
                        break;
                    }
                    
                    const invItem = this.inventory.find(i=>i.id===medId);
                    if (!invItem) {
                        this.showNotification('Medicine not found in inventory.', 'error');
                        totalStockCheck = false;
                        break;
                    }
                    
                    if (qty > invItem.stock) {
                        this.showNotification(`Insufficient stock for ${invItem.name}. Available: ${invItem.stock}`, 'error');
                        totalStockCheck = false;
                        break;
                    }
                    
                    meds.push({
                        medicineId: medId,
                        name:       invItem.name,
                        type:       invItem.type,
                        quantity:   qty
                    });
                }

                if (!totalStockCheck) return;
                if (meds.length===0) {
                    this.showNotification('Please add at least one medicine.', 'error');
                    return;
                }

                // Restore old stock if editing
                if (this.editingId) {
                    const existing = this.prescriptions.find(p=>p.id===this.editingId);
                    if (existing && existing.medicinesList) {
                        existing.medicinesList.forEach(m=>{
                            const inv = this.inventory.find(i=>i.id===m.medicineId);
                            if (inv) inv.stock += m.quantity;
                        });
                    }
                }

                // Deduct new stock
                meds.forEach(m=>{
                    const inv = this.inventory.find(i=>i.id===m.medicineId);
                    if (inv) inv.stock -= m.quantity;
                });

                // Printable string
                const medicinesString = meds.map(m=>`${m.name} - ${m.quantity} ${m.type}${m.quantity>1?'s':''}`).join('\\n');

                const prescData = {
                    patientName,
                    patientId,
                    diagnosis,
                    notes,
                    medicines: medicinesString,
                    medicinesList: meds,
                    doctor: this.currentUser.name,
                    date: new Date().toISOString().split('T')[0]
                };

                if (this.editingId) {
                    const ix = this.prescriptions.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.prescriptions[ix] = { ...this.prescriptions[ix], ...prescData };
                        this.showNotification('Prescription updated successfully','success');
                    }
                } else {
                    const newPresc = { id: Date.now(), ...prescData };
                    this.prescriptions.unshift(newPresc);
                    this.showNotification('Prescription saved successfully','success');
                }

                this.saveData();
                this.closeModal();
                this.render();
            }

                    username: fd.get('username'),
                    email:    fd.get('email'),

                if (!data.password && !this.editingId) {

                const exist = this.users.find(u=>u.username===data.username && u.id!==this.editingId);

                if (this.editingId) {

                                        <select name="status" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none">
                                            <option value="Pending" ${(this.formData.status||'Pending')==='Pending'?'selected':''}>Pending</option>
                                            <option value="Paid" ${(this.formData.status||'Pending')==='Paid'?'selected':''}>Paid</option>
                                            <option value="Cancelled" ${(this.formData.status||'Pending')==='Cancelled'?'selected':''}>Cancelled</option>
                                        </select></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-orange-700 transition">${this.editingId?'Update':'Create'} Invoice</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Lab Modal -->
                    <div id="lab-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Lab Test':'New Lab Test'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="lab-form" onsubmit="event.preventDefault(); app.saveLabTest();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Select Patient *</label>
                                        <select name="patientId" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required>
                                            <option value="">Select Patient</option>
                                            ${this.patients.map(p=>`<option value="${p.id}" ${this.formData.patientId===p.id?'selected':''}>${p.name} (${p.mrNumber})</option>`).join('')}
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Test Name *</label>
                                        <input type="text" name="testName" value="${this.formData.testName||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Date *</label>
                                        <input type="date" name="date" value="${this.formData.date||new Date().toISOString().split('T')[0]}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                                        <select name="status" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none">
                                            <option value="Pending" ${(this.formData.status||'Pending')==='Pending'?'selected':''}>Pending</option>
                                            <option value="In Progress" ${(this.formData.status||'Pending')==='In Progress'?'selected':''}>In Progress</option>
                                            <option value="Completed" ${(this.formData.status||'Pending')==='Completed'?'selected':''}>Completed</option>
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Price (Rs)</label>
                                        <input type="number" name="price" value="${this.formData.price || 0}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" min="0" step="0.01"></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Results</label>
                                        <textarea name="results" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" rows="3">${this.formData.results||''}</textarea></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">${this.editingId?'Update':'Add'} Test</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Petty Cash Modal -->
                    <div id="petty-cash-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Petty Cash Entry':'Add New Petty Cash Entry'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="petty-cash-form" onsubmit="event.preventDefault(); app.savePettyCash();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Date *</label>
                                        <input type="date" name="date" value="${this.formData.date || new Date().toISOString().split('T')[0]}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Amount (Rs) *</label>
                                        <input type="number" name="amount" value="${this.formData.amount || ''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" min="0" step="0.01" required></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Category *</label>
                                        <select name="category" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                                            <option value="Office Supplies" ${this.formData.category==='Office Supplies'?'selected':''}>Office Supplies</option>
                                            <option value="Maintenance" ${this.formData.category==='Maintenance'?'selected':''}>Maintenance</option>
                                            <option value="Medical Supplies" ${this.formData.category==='Medical Supplies'?'selected':''}>Medical Supplies</option>
                                            <option value="Transportation" ${this.formData.category==='Transportation'?'selected':''}>Transportation</option>
                                            <option value="Miscellaneous" ${this.formData.category==='Miscellaneous'?'selected':''}>Miscellaneous</option>
                                        </select></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Description *</label>
                                        <textarea name="description" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" rows="3" required>${this.formData.description||''}</textarea></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-yellow-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-yellow-700 transition">${this.editingId?'Update':'Add'} Entry</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Staff Modal -->
                    <div id="staff-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in max-h-[90vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">${this.editingId?'Edit Staff Member':'Add New Staff Member'}</h3>
                                <button onclick="app.closeModal()" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="staff-form" onsubmit="event.preventDefault(); app.saveStaff();">
                                <div class="space-y-4">
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                                        <input type="text" name="name" value="${this.formData.name||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required></div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
                                            <input type="text" name="username" value="${this.formData.username||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required></div>
                                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
                                            <input type="email" name="email" value="${this.formData.email||''}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required></div>
                                    </div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Password ${this.editingId?'(leave blank to keep current)':'*'}</label>
                                        <input type="password" name="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" ${this.editingId?'':'required'}></div>
                                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Role *</label>
                                        <select name="role" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-5 outline-none" required>
                                            <option value="Admin" ${(this.formData.role||'Staff')==='Admin'?'selected':''}>Admin</option>
                                            <option value="Doctor" ${(this.formData.role||'Staff')==='Doctor'?'selected':''}>Doctor</option>
                                            <option value="Nurse" ${(this.formData.role||'Staff')==='Nurse'?'selected':''}>Nurse</option>
                                            <option value="Pharmacist" ${(this.formData.role||'Staff')==='Pharmacist'?'selected':''}>Pharmacist</option>
                                            <option value="Staff" ${(this.formData.role||'Staff')==='Staff'?'selected':''}>Staff</option>
                                        </select></div>
                                    <div class="flex justify-end pt-4 gap-3">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 transition">Cancel</button>
                                        <button type="submit" class="bg-gray-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-gray-700 transition">${this.editingId?'Update':'Add'} Staff</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            // -----------------------------------------------------------------
            // EVENT BINDING (none required – all inline)
            // -----------------------------------------------------------------
            bindEvents() {
                // Set up charts after rendering
                setTimeout(() => {
                    this.setupDashboardCharts();
                }, 500);
            }
            
            setupDashboardCharts() {
                // Appointment status chart
                const appointmentCtx = document.getElementById('appointmentChart')?.getContext('2d');
                if (appointmentCtx) {
                    const stats = this.getStats();
                    new Chart(appointmentCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Pending', 'Confirmed', 'Completed', 'Urgent'],
                            datasets: [{
                                data: [
                                    stats.pendingAppointments,
                                    stats.todayConfirmed,
                                    stats.todayCompleted,
                                    stats.urgentAppointments
                                ],
                                backgroundColor: [
                                    '#fbbf24',
                                    '#3b82f6',
                                    '#10b981',
                                    '#f43f5e'
                                ]
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });
                }

                // Revenue chart
                const revenueCtx = document.getElementById('revenueChart')?.getContext('2d');
                if (revenueCtx) {
                    // Generate monthly revenue data
                    const months = [];
                    const revenueData = [];
                    const today = new Date();
                    const currentYear = today.getFullYear();
                    const currentMonth = today.getMonth() + 1;
                    
                    for (let i = 0; i < 6; i++) {
                        const month = (currentMonth - i + 12) % 12 || 12;
                        const year = currentYear - Math.floor((currentMonth - i) / 12);
                        months.unshift(`${new Date(year, month - 1).toLocaleString('default', { month: 'short' })} ${year}`);
                        
                        const monthRevenue = this.invoices
                            .filter(i => {
                                const date = new Date(i.date);
                                return date.getMonth() + 1 === month && date.getFullYear() === year;
                            })
                            .reduce((sum, i) => sum + (Number(i.amount) || 0), 0);
                        
                        revenueData.unshift(monthRevenue);
                    }

                    new Chart(revenueCtx, {
                        type: 'bar',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Monthly Revenue',
                                data: revenueData,
                                backgroundColor: '#3b82f6',
                                borderColor: '#1d4ed8',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Revenue (Rs)'
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    display: false
                                }
                            }
                        }
                    });
                }
                
                // Petty Cash Chart
                const pettyCashCtx = document.getElementById('pettyCashChart')?.getContext('2d');
                if (pettyCashCtx) {
                    // Group petty cash entries by category
                    const categories = {};
                    this.pettyCash.forEach(entry => {
                        const category = entry.category || 'Miscellaneous';
                        if (!categories[category]) {
                            categories[category] = 0;
                        }
                        categories[category] += Number(entry.amount) || 0;
                    });
                    
                    const chartLabels = Object.keys(categories);
                    const chartData = Object.values(categories);
                    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6'];
                    
                    new Chart(pettyCashCtx, {
                        type: 'pie',
                        data: {
                            labels: chartLabels,
                            datasets: [{
                                data: chartData,
                                backgroundColor: colors
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'right'
                                }
                            }
                        }
                    });
                }
            }
        }

        // Initialise the app and expose it globally for inline handlers
        const app = new ClinicApp();
        window.app = app;
    </script>
</body>
</html>
