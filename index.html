<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health+ Clinic Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajaxlings/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-in {
            animation: fadeIn 0.2s ease-out;
        }
        
        .sidebar {
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
        // Simple Clinic Management System - Vanilla JavaScript Version
        class ClinicApp {
            constructor() {
                this.currentView = 'dashboard';
                this.currentUser = null;
                this.isSidebarOpen = false;
                
                // Initialize data
                this.initializeData();
                this.render();
                this.bindEvents();
            }
            
            initializeData() {
                // Users data
                this.users = JSON.parse(localStorage.getItem('clinic_users')) || [
                    { id: 1, username: 'admin', password: 'admin123', email: 'admin@clinic.com', role: 'Admin', name: 'Dr. Administrator' }
                ];
                
                // Mock data
                this.patients = JSON.parse(localStorage.getItem('clinic_patients')) || [];
                this.appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [];
                this.inventory = JSON.parse(localStorage.getItem('clinic_inventory')) || [
                    { id: 1, name: 'Panadol 500mg', type: 'Tablet', stock: 500, price: 5 },
                    { id: 2, name: 'Augmentin 625mg', type: 'Tablet', stock: 100, price: 45 },
                    { id: 3, name: 'Brufen 400mg', type: 'Syrup', stock: 50, price: 120 }
                ];
                this.prescriptions = JSON.parse(localStorage.getItem('clinic_prescriptions')) || [];
                this.invoices = JSON.parse(localStorage.getItem('clinic_invoices')) || [];
                
                this.currentUser = JSON.parse(localStorage.getItem('clinic_current_user')) || null;
                this.searchTerm = '';
            }
            
            saveData() {
                localStorage.setItem('clinic_users', JSON.stringify(this.users));
                localStorage.setItem('clinic_patients', JSON.stringify(this.patients));
                localStorage.setItem('clinic_appointments', JSON.stringify(this.appointments));
                localStorage.setItem('clinic_inventory', JSON.stringify(this.inventory));
                localStorage.setItem('clinic_prescriptions', JSON.stringify(this.prescriptions));
                localStorage.setItem('clinic_invoices', JSON.stringify(this.invoices));
                localStorage.setItem('clinic_current_user', JSON.stringify(this.currentUser));
            }
            
            bindEvents() {
                document.addEventListener('click', (e) => {
                    // Handle navigation
                    if (e.target.closest('[data-nav]')) {
                        this.currentView = e.target.closest('[data-nav]').dataset.nav;
                        this.isSidebarOpen = false;
                        this.render();
                    }
                    
                    // Handle logout
                    if (e.target.closest('#logout-btn')) {
                        this.currentUser = null;
                        this.render();
                    }
                    
                    // Handle sidebar toggle
                    if (e.target.closest('#sidebar-toggle')) {
                        this.isSidebarOpen = true;
                        this.render();
                    }
                    
                    // Close sidebar when clicking overlay
                    if (e.target.closest('#overlay')) {
                        this.isSidebarOpen = false;
                        this.render();
                    }
                    
                    // Handle login
                    if (e.target.closest('#login-btn')) {
                        this.handleLogin();
                    }
                    
                    // Handle form submissions
                    if (e.target.closest('#patient-form')) {
                        e.preventDefault();
                        this.savePatient();
                    }
                    
                    if (e.target.closest('#appointment-form')) {
                        e.preventDefault();
                        this.saveAppointment();
                    }
                });
                
                // Handle search
                document.addEventListener('input', (e) => {
                    if (e.target.id === 'search-patients') {
                        this.searchTerm = e.target.value;
                        this.renderPatients();
                    }
                });
            }
            
            handleLogin() {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                const user = this.users.find(u => 
                    (u.username === username || u.email === username) && u.password === password
                );
                
                if (user) {
                    this.currentUser = user;
                    this.saveData();
                    this.render();
                } else {
                    alert('Invalid credentials! Use: admin / admin123');
                }
            }
            
            generateMR() {
                const year = new Date().getFullYear().toString().substr(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;
            }
            
            savePatient() {
                const formData = new FormData(document.getElementById('patient-form'));
                const patient = {
                    id: Date.now(),
                    mrNumber: this.generateMR(),
                    name: formData.get('name'),
                    age: formData.get('age'),
                    gender: formData.get('gender'),
                    contact: formData.get('contact'),
                    registeredAt: new Date().toISOString()
                };
                
                this.patients.unshift(patient);
                this.saveData();
                this.closeModal();
                this.render();
            }
            
            saveAppointment() {
                const formData = new FormData(document.getElementById('appointment-form'));
                const appointment = {
                    id: Date.now(),
                    patientName: formData.get('patientName'),
                    date: formData.get('date'),
                    time: formData.get('time'),
                    doctor: formData.get('doctor'),
                    token: this.appointments.filter(a => a.date === formData.get('date')).length + 1,
                    status: 'Pending'
                };
                
                this.appointments.unshift(appointment);
                this.saveData();
                this.closeModal();
                this.render();
            }
            
            closeModal() {
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.classList.add('hidden');
                });
            }
            
            showModal(modalId) {
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.classList.add('hidden');
                });
                document.getElementById(modalId).classList.remove('hidden');
            }
            
            render() {
                if (!this.currentUser) {
                    this.renderLogin();
                    return;
                }
                
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="flex h-screen bg-slate-50 overflow-hidden">
                        <!-- Sidebar -->
                        <aside class="sidebar fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-200 z-50 transform ${this.isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0">
                            <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                                    <span class="text-blue-600 font-bold">H+</span>
                                </div>
                                <div>
                                    <h2 class="font-bold text-slate-800 text-sm">Health+ Clinic</h2>
                                    <p class="text-xs text-slate-500">Management System</p>
                                </div>
                            </div>
                            <nav class="p-4 space-y-2">
                                ${this.renderNavItems()}
                            </nav>
                            <div class="absolute bottom-0 w-full p-4 border-t border-slate-100">
                                <button id="logout-btn" class="flex items-center gap-2 text-red-500 w-full p-2 rounded-lg hover:bg-red-50">
                                    <span>🚪</span> Logout
                                </button>
                            </div>
                        </aside>

                        <!-- Main Content -->
                        <div class="flex-1 flex flex-col md:ml-64">
                            <!-- Header -->
                            <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 md:px-8">
                                <button id="sidebar-toggle" class="md:hidden text-slate-500">
                                    <span>☰</span>
                                </button>
                                <h1 class="text-xl font-bold text-slate-800 capitalize">${this.currentView}</h1>
                                <div class="flex items-center gap-3">
                                    <div class="text-right hidden sm:block">
                                        <p class="text-sm font-bold">${this.currentUser.name}</p>
                                        <p class="text-xs text-slate-500">${this.currentUser.role}</p>
                                    </div>
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                                        ${this.currentUser.name[0]}
                                    </div>
                                </div>
                            </header>

                            <!-- Main Content -->
                            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                                ${this.renderCurrentView()}
                            </main>
                        </div>

                        <!-- Mobile Overlay -->
                        ${this.isSidebarOpen ? '<div id="overlay" class="fixed inset-0 bg-black/50 z-40 md:hidden"></div>' : ''}

                        <!-- Modals -->
                        ${this.renderModals()}
                    </div>
                `;
            }
            
            renderNavItems() {
                const items = [
                    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
                    { id: 'patients', icon: '👥', label: 'Patients' },
                    { id: 'appointments', icon: '📅', label: 'Appointments' },
                    { id: 'prescriptions', icon: '📋', label: 'Prescriptions' },
                    { id: 'billing', icon: '💳', label: 'Billing' },
                    { id: 'pharmacy', icon: '💊', label: 'Pharmacy' }
                ];
                
                if (this.currentUser.role === 'Admin') {
                    items.push({ id: 'staff', icon: '👨‍💼', label: 'Manage Staff' });
                }
                
                return items.map(item => `
                    <button data-nav="${item.id}" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${this.currentView === item.id ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-blue-50'}">
                        <span>${item.icon}</span>
                        <span class="font-medium">${item.label}</span>
                    </button>
                `).join('');
            }
            
            renderCurrentView() {
                const views = {
                    dashboard: this.renderDashboard(),
                    patients: this.renderPatients(),
                    appointments: this.renderAppointments(),
                    prescriptions: this.renderPrescriptions(),
                    billing: this.renderBilling(),
                    pharmacy: this.renderPharmacy(),
                    staff: this.renderStaff()
                };
                
                return views[this.currentView] || '<div>Page not found</div>';
            }
            
            renderDashboard() {
                const stats = {
                    totalPatients: this.patients.length,
                    todayAppointments: this.appointments.filter(a => a.date === new Date().toISOString().split('T')[0]).length,
                    revenue: this.invoices.reduce((acc, inv) => acc + (Number(inv.total) || 0), 0),
                    lowStock: this.inventory.filter(i => i.stock < 50).length
                };
                
                return `
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-slate-500 text-sm">Total Patients</p>
                                        <h3 class="text-3xl font-bold text-slate-800 mt-1">${stats.totalPatients}</h3>
                                    </div>
                                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">👥</div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-slate-500 text-sm">Today's Appointments</p>
                                        <h3 class="text-3xl font-bold text-slate-800 mt-1">${stats.todayAppointments}</h3>
                                    </div>
                                    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg">📅</div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-slate-500 text-sm">Total Revenue</p>
                                        <h3 class="text-3xl font-bold text-slate-800 mt-1">Rs ${stats.revenue.toLocaleString()}</h3>
                                    </div>
                                    <div class="p-3 bg-green-50 text-green-600 rounded-lg">💰</div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-slate-500 text-sm">Low Stock</p>
                                        <h3 class="text-3xl font-bold text-red-600 mt-1">${stats.lowStock}</h3>
                                    </div>
                                    <div class="p-3 bg-red-50 text-red-600 rounded-lg">⚠️</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <button onclick="app.showModal('patient-modal')" class="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-center">
                                <span class="text-2xl block mb-2">👥</span>
                                <span class="font-medium">New Patient</span>
                            </button>
                            <button onclick="app.showModal('appointment-modal')" class="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-center">
                                <span class="text-2xl block mb-2">📅</span>
                                <span class="font-medium">Book Appointment</span>
                            </button>
                            <button class="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-center">
                                <span class="text-2xl block mb-2">📋</span>
                                <span class="font-medium">Prescription</span>
                            </button>
                            <button class="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-center">
                                <span class="text-2xl block mb-2">💳</span>
                                <span class="font-medium">Create Invoice</span>
                            </button>
                        </div>
                    </div>
                `;
            }
            
            renderPatients() {
                const filteredPatients = this.searchTerm ? 
                    this.patients.filter(p => 
                        p.name.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
                        p.mrNumber.toLowerCase().includes(this.searchTerm.toLowerCase())
                    ) : this.patients;
                
                return `
                    <div class="space-y-6">
                        <div class="flex flex-col sm:flex-row justify-between gap-4">
                            <div class="relative max-w-md w-full">
                                <input 
                                    type="text" 
                                    id="search-patients"
                                    placeholder="Search patients..." 
                                    class="w-full pl-10 p-2.5 border rounded-lg focus:border-blue-500 outline-none"
                                    value="${this.searchTerm}"
                                >
                                <span class="absolute left-3 top-3">🔍</span>
                            </div>
                            <button onclick="app.showModal('patient-modal')" class="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">
                                <span>➕</span> New Patient
                            </button>
                        </div>
                        
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-50 text-slate-600 text-sm font-semibold border-b border-slate-200">
                                        <tr>
                                            <th class="p-4">MR Number</th>
                                            <th class="p-4">Name</th>
                                            <th class="p-4">Age/Gender</th>
                                            <th class="p-4">Contact</th>
                                            <th class="p-4">Registered</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${filteredPatients.map(patient => `
                                            <tr class="hover:bg-slate-50">
                                                <td class="p-4 font-mono text-sm text-blue-600 font-bold">${patient.mrNumber}</td>
                                                <td class="p-4 font-medium">${patient.name}</td>
                                                <td class="p-4 text-slate-500">${patient.age} / ${patient.gender}</td>
                                                <td class="p-4 text-slate-500">${patient.contact}</td>
                                                <td class="p-4 text-slate-500 text-sm">${new Date(patient.registeredAt).toLocaleDateString()}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            renderAppointments() {
                return `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-slate-700">Appointments</h3>
                            <button onclick="app.showModal('appointment-modal')" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-purple-700 transition">
                                <span>➕</span> Book Appointment
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${this.appointments.map(apt => `
                                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">Token #${apt.token}</span>
                                        <span class="text-slate-400 text-xs">${apt.date} ${apt.time}</span>
                                    </div>
                                    <h4 class="font-bold text-slate-800">${apt.patientName}</h4>
                                    <p class="text-sm text-slate-500">${apt.doctor}</p>
                                    <p class="text-xs text-slate-400 mt-2">Status: ${apt.status}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            renderPrescriptions() {
                return `<div class="text-center p-8">Prescriptions module - Under development</div>`;
            }
            
            renderBilling() {
                return `<div class="text-center p-8">Billing module - Under development</div>`;
            }
            
            renderPharmacy() {
                return `
                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-slate-700">Medicine Inventory</h3>
                        </div>
                        
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-600 text-sm font-semibold border-b border-slate-200">
                                    <tr>
                                        <th class="p-4">Medicine</th>
                                        <th class="p-4">Type</th>
                                        <th class="p-4">Stock</th>
                                        <th class="p-4">Price</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${this.inventory.map(item => `
                                        <tr class="hover:bg-slate-50">
                                            <td class="p-4 font-medium">${item.name}</td>
                                            <td class="p-4 text-slate-500">${item.type}</td>
                                            <td class="p-4 font-bold ${item.stock < 50 ? 'text-red-600' : 'text-green-600'}">${item.stock} units</td>
                                            <td class="p-4">Rs ${item.price}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            
            renderStaff() {
                if (this.currentUser.role !== 'Admin') {
                    return '<div class="text-center p-8">Access denied</div>';
                }
                
                return `
                    <div class="space-y-6">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-600 text-sm font-semibold border-b border-slate-200">
                                    <tr>
                                        <th class="p-4">Name</th>
                                        <th class="p-4">Username</th>
                                        <th class="p-4">Email</th>
                                        <th class="p-4">Role</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${this.users.map(user => `
                                        <tr class="hover:bg-slate-50">
                                            <td class="p-4 font-medium">${user.name}</td>
                                            <td class="p-4 text-slate-500">${user.username}</td>
                                            <td class="p-4 text-slate-500">${user.email}</td>
                                            <td class="p-4">
                                                <span class="px-2 py-1 rounded text-xs font-bold ${user.role === 'Admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                                                    ${user.role}
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            
            renderLogin() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
                            <div class="text-center mb-8">
                                <div class="w-24 h-24 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-4">
                                    <span class="text-3xl">🏥</span>
                                </div>
                                <h1 class="text-xl font-bold text-slate-800">Health+ Clinic</h1>
                                <p class="text-slate-500">Management System</p>
                            </div>
                            
                            <form class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                                    <input type="text" id="username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="admin" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                                    <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="admin123" required>
                                </div>
                                <button type="button" id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                                    Login to System
                                </button>
                            </form>
                            
                            <div class="mt-4 p-3 bg-blue-50 rounded-lg text-sm text-blue-700">
                                <strong>Demo Credentials:</strong><br>
                                Username: admin<br>
                                Password: admin123
                            </div>
                        </div>
                    </div>
                `;
            }
            
            renderModals() {
                return `
                    <!-- Patient Modal -->
                    <div id="patient-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">New Patient</h3>
                                <button onclick="app.closeModal()" class="text-slate-400">✕</button>
                            </div>
                            <form id="patient-form">
                                <div class="space-y-4">
                                    <input type="text" name="name" placeholder="Full Name" class="w-full p-3 border rounded-lg" required>
                                    <div class="grid grid-cols-2 gap-4">
                                        <input type="number" name="age" placeholder="Age" class="w-full p-3 border rounded-lg" required>
                                        <select name="gender" class="w-full p-3 border rounded-lg">
                                            <option>Male</option>
                                            <option>Female</option>
                                        </select>
                                    </div>
                                    <input type="tel" name="contact" placeholder="Contact Number" class="w-full p-3 border rounded-lg" required>
                                    <div class="flex justify-end pt-4">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border rounded-lg mr-3">Cancel</button>
                                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Save</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Appointment Modal -->
                    <div id="appointment-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden">
                        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 animate-in">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">Book Appointment</h3>
                                <button onclick="app.closeModal()" class="text-slate-400">✕</button>
                            </div>
                            <form id="appointment-form">
                                <div class="space-y-4">
                                    <select name="patientName" class="w-full p-3 border rounded-lg" required>
                                        <option value="">Select Patient</option>
                                        ${this.patients.map(p => `<option value="${p.name}">${p.name} (${p.mrNumber})</option>`).join('')}
                                    </select>
                                    <div class="grid grid-cols-2 gap-4">
                                        <input type="date" name="date" value="${new Date().toISOString().split('T')[0]}" class="w-full p-3 border rounded-lg" required>
                                        <input type="time" name="time" class="w-full p-3 border rounded-lg" required>
                                    </div>
                                    <select name="doctor" class="w-full p-3 border rounded-lg" required>
                                        <option value="">Select Doctor</option>
                                        <option>Dr. Administrator</option>
                                        <option>Dr. Sarah Smith</option>
                                    </select>
                                    <div class="flex justify-end pt-4">
                                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 border rounded-lg mr-3">Cancel</button>
                                        <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold">Book</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }
        }

        // Initialize the app
        const app = new ClinicApp();
        
        // Make app globally available for onclick handlers
        window.app = app;
    </script>
</body>
</html>
