<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health+ Clinic Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Toast UI – Notyf -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-in { animation: fadeIn .2s ease-out; }

        .sidebar { transition: transform .3s ease; }

        .stat-card {
            transition: all .3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,.1);
        }
        .table-row:hover { background-color:#f8fafc; }

        /* Dark‑mode overrides for Tailwind‑generated classes */
        .dark .bg-white          { background-color:#1e293b; }
        .dark .bg-slate-50       { background-color:#0f172a; }
        .dark .border-slate-200  { border-color:#334155; }
        .dark .text-slate-800    { color:#f1f5f9; }
        .dark .text-slate-600    { color:#cbd5e1; }
        .dark .text-slate-500    { color:#e2e8f0; }
        .dark .text-slate-400    { color:#f1f5f9; }
        .dark .bg-blue-50        { background-color:#1e3a8a; }
        .dark .bg-purple-50      { background-color:#4c1d95; }
        .dark .bg-green-50       { background-color:#065f46; }
        .dark .bg-red-50         { background-color:#7f1d1d; }
        .dark .bg-yellow-50      { background-color:#78350f; }
        .dark .bg-gray-50        { background-color:#111827; }
        .dark .bg-teal-50        { background-color:#134e4a; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <!-- Hidden file input for Import -->
    <input type="file" id="import-file" accept=".json" class="hidden"
           onchange="app.importData(event)">

    <script>
        // ======================================================================
        // ClinicApp – complete single‑page clinic manager (now includes Dark‑mode,
        // Toast UI, Export/Import & Audit‑log)
        // ======================================================================
        class ClinicApp {
            constructor() {
                this.currentView   = 'dashboard';
                this.currentUser   = null;
                this.isSidebarOpen = false;
                this.isDark        = JSON.parse(localStorage.getItem('clinic_dark')||'false');
                this.formData      = {};
                this.editingId     = null;
                this.searchTerm    = '';

                // Initialise NOTYF (toast UI)
                this.notyf = new Notyf({
                    duration: 3000,
                    position: { x:'right', y:'top' },
                    types: [
                        { type: 'info',    background: '#3b82f6', icon: { className: 'fas fa-info-circle',    tagName: 'i', color: '#fff' } },
                        { type: 'success', background: '#22c55e', icon: { className: 'fas fa-check-circle',   tagName: 'i', color: '#fff' } },
                        { type: 'error',   background: '#ef4444', icon: { className: 'fas fa-exclamation-circle', tagName: 'i', color: '#fff' } }
                    ]
                });

                // Initialise / load data
                this.initializeData();
                this.render();
                this.bindEvents();
            }

            // -----------------------------------------------------------------
            // DATA INITIALISATION & UTILITIES
            // -----------------------------------------------------------------
            initializeData() {
                // Users
                this.users = JSON.parse(localStorage.getItem('clinic_users')) || [
                    { id: 1, username: 'admin', password: 'admin123', email: 'admin@clinic.com', role: 'Admin', name: 'Dr. John Smith' },
                    { id: 2, username: 'doctor', password: 'doctor123', email: 'doctor@clinic.com', role: 'Doctor', name: 'Dr. Sarah Johnson' },
                    { id: 3, username: 'pharmacist', password: 'pharma123', email: 'pharma@clinic.com', role: 'Pharmacist', name: 'Michael Brown' }
                ];

                // Patients
                this.patients = JSON.parse(localStorage.getItem('clinic_patients')) || [
                    { id: 1, mrNumber: 'MR-24-5837', name: 'Alice Johnson', age: 35, gender: 'Female', contact: '555-0123', address: '123 Main St', registeredAt: '2024-01-15' },
                    { id: 2, mrNumber: 'MR-24-6291', name: 'Robert Chen',   age: 42, gender: 'Male',   contact: '555-0456', address: '456 Oak Ave',   registeredAt: '2024-01-20' },
                    { id: 3, mrNumber: 'MR-24-7742', name: 'Maria Garcia',  age: 28, gender: 'Female', contact: '555-0789', address: '789 Pine Rd',   registeredAt: '2024-02-05' }
                ];

                // Appointments
                this.appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [
                    { id: 1, patientName: 'Alice Johnson',   patientId: 1, date: '2024-03-20', time: '10:00', doctor: 'Dr. Sarah Johnson', token: 1, status: 'Completed', notes: 'Regular checkup' },
                    { id: 2, patientName: 'Robert Chen',     patientId: 2, date: '2024-03-20', time: '11:30', doctor: 'Dr. John Smith', token: 2, status: 'Confirmed', notes: 'Follow-up appointment' },
                    { id: 3, patientName: 'Maria Garcia',    patientId: 3, date: '2024-03-21', time: '09:00', doctor: 'Dr. Sarah Johnson', token: 1, status: 'Pending',   notes: 'Initial consultation' }
                ];

                // Inventory
                this.inventory = JSON.parse(localStorage.getItem('clinic_inventory')) || [
                    { id: 1, name: 'Panadol 500mg', type: 'Tablet',   stock: 150, price: 5,  supplier: 'PharmaCorp',   expiry: '2025-12-31' },
                    { id: 2, name: 'Augmentin 625mg',type: 'Tablet',   stock: 45,  price: 45, supplier: 'MediSupply',  expiry: '2025-08-15' },
                    { id: 3, name: 'Brufen 400mg',   type: 'Syrup',    stock: 25,  price: 120,supplier: 'HealthPlus',  expiry: '2024-11-30' },
                    { id: 4, name: 'Flagyl 400mg',   type: 'Tablet',   stock: 80,  price: 15, supplier: 'PharmaCorp',   expiry: '2026-03-20' },
                    { id: 5, name: 'Amoxil 250mg',   type: 'Capsule',  stock: 120, price: 30, supplier: 'MediSupply',  expiry: '2025-09-15' }
                ];

                // Prescriptions
                this.prescriptions = JSON.parse(localStorage.getItem('clinic_prescriptions')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, doctor: 'Dr. Sarah Johnson', date: '2024-03-15', medicines: 'Panadol 500mg - 1 tablet twice daily for 5 days', diagnosis: 'Headache and fever', notes: 'Rest and hydrate well' },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, doctor: 'Dr. John Smith',    date: '2024-03-10', medicines: 'Augmentin 625mg - 1 tablet twice daily for 7 days', diagnosis: 'Respiratory infection', notes: 'Complete full course' }
                ];

                // Invoices
                this.invoices = JSON.parse(localStorage.getItem('clinic_invoices')) || [
                    { id: 1, invoiceNo: 'INV-24-001', patientName: 'Alice Johnson', patientId: 1, date: '2024-03-15', items: 'Consultation Fee, Lab Test', amount: 2500, status: 'Paid' },
                    { id: 2, invoiceNo: 'INV-24-002', patientName: 'Robert Chen',   patientId: 2, date: '2024-03-10', items: 'Consultation Fee, Medicines', amount: 1800, status: 'Pending' }
                ];

                // Lab tests
                this.labTests = JSON.parse(localStorage.getItem('clinic_lab_tests')) || [
                    { id: 1, patientName: 'Alice Johnson', patientId: 1, testName: 'Blood Test', date: '2024-03-15', status: 'Completed', results: 'Normal ranges' },
                    { id: 2, patientName: 'Robert Chen',   patientId: 2, testName: 'X-Ray Chest', date: '2024-03-18', status: 'In Progress', results: '' }
                ];

                // Petty‑Cash (daily expenses)
                this.pettyCash = JSON.parse(localStorage.getItem('clinic_petty_cash')) || [];

                // Audit Log
                this.auditLog = JSON.parse(localStorage.getItem('clinic_audit_log')) || [];

                this.currentUser = JSON.parse(localStorage.getItem('clinic_current_user')) || null;
            }

            saveData() {
                localStorage.setItem('clinic_users',          JSON.stringify(this.users));
                localStorage.setItem('clinic_patients',      JSON.stringify(this.patients));
                localStorage.setItem('clinic_appointments',  JSON.stringify(this.appointments));
                localStorage.setItem('clinic_inventory',     JSON.stringify(this.inventory));
                localStorage.setItem('clinic_prescriptions',JSON.stringify(this.prescriptions));
                localStorage.setItem('clinic_invoices',      JSON.stringify(this.invoices));
                localStorage.setItem('clinic_lab_tests',    JSON.stringify(this.labTests));
                localStorage.setItem('clinic_petty_cash',   JSON.stringify(this.pettyCash));
                localStorage.setItem('clinic_audit_log',    JSON.stringify(this.auditLog));
                localStorage.setItem('clinic_current_user',  JSON.stringify(this.currentUser));
                localStorage.setItem('clinic_dark',          JSON.stringify(this.isDark));
            }

            // -----------------------------------------------------------------
            // LOGGING / AUDIT
            // -----------------------------------------------------------------
            logAction(action, details = '') {
                if (!this.currentUser) return;
                this.auditLog.push({
                    ts: new Date().toISOString(),
                    userId: this.currentUser.id,
                    userName: this.currentUser.name,
                    action,
                    details
                });
                this.saveData();
            }

            // -----------------------------------------------------------------
            // UTILS
            // -----------------------------------------------------------------
            generateMR() {
                const year   = new Date().getFullYear().toString().substr(-2);
                const random = Math.floor(1000 + Math.random() * 9000);
                return `MR-${year}-${random}`;
            }

            generateInvoiceNo() {
                const year  = new Date().getFullYear().toString().substr(-2);
                const count = this.invoices.length + 1;
                return `INV-${year}-${count.toString().padStart(3,'0')}`;
            }

            formatCurrency(amount) {
                return `Rs ${Number(amount||0).toLocaleString()}`;
            }

            getStats() {
                const today = new Date().toISOString().split('T')[0];
                return {
                    totalPatients:       this.patients.length,
                    todayAppointments:   this.appointments.filter(a=>a.date===today).length,
                    totalAppointments:  this.appointments.length,
                    revenue:             this.invoices.reduce((s,i)=>s+(Number(i.amount)||0),0),
                    monthlyRevenue:      this.invoices
                                         .filter(i=>new Date(i.date).getMonth()===new Date().getMonth())
                                         .reduce((s,i)=>s+(Number(i.amount)||0),0,
                    lowStock:            this.inventory.filter(i=>i.stock<50).length,
                    pendingAppointments:this.appointments.filter(a=>a.status==='Pending').length,
                    todayPettyCash:      this.pettyCash.filter(p=>p.date===today).reduce((s,p)=>s+(Number(p.amount)||0),0)
                };
            }

            // -----------------------------------------------------------------
            // AUTHENTICATION
            // -----------------------------------------------------------------
            handleLogin() {
                const username = document.getElementById('username')?.value;
                const password = document.getElementById('password')?.value;
                if (!username || !password) return;

                const user = this.users.find(u =>
                    (u.username===username || u.email===username) && u.password===password
                );
                if (user) {
                    this.currentUser = user;
                    this.saveData();
                    this.showNotification('Login successful','success');
                    this.render();
                } else {
                    this.showNotification('Invalid credentials! Use: admin / admin123','error');
                }
            }

            logout() {
                this.currentUser = null;
                this.saveData();
                this.render();
            }

            // -----------------------------------------------------------------
            // UI HELPERS (modal handling, notifications, etc.)
            // -----------------------------------------------------------------
            showModal(modalId, data=null) {
                this.editingId = data?.id || null;
                this.formData  = data ? {...data} : {};

                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                document.getElementById(modalId).classList.remove('hidden');

                // Prescription‑specific initialisation (dynamic medicine selector)
                if (modalId==='prescription-modal') {
                    if (Array.isArray(this.formData.medicinesList)) {
                        // already an array – keep it
                    } else if (this.formData.medicines) {
                        try {
                            const maybe = JSON.parse(this.formData.medicines);
                            this.formData.medicinesList = Array.isArray(maybe) ? maybe : [];
                        } catch (e) { this.formData.medicinesList = []; }
                    } else {
                        this.formData.medicinesList = [];
                    }
                    this.renderPrescriptionMedicationRows();
                }
            }

            closeModal() {
                document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
                this.editingId = null;
                this.formData  = {};
            }

            showNotification(msg, type='info') {
                // Notyf expects type = 'info' | 'success' | 'error'
                this.notyf.open({ type, message: msg });
            }

            // -----------------------------------------------------------------
            // DARK‑MODE TOGGLE
            // -----------------------------------------------------------------
            toggleDark() {
                this.isDark = !this.isDark;
                this.saveData();
                this.render();
            }

            // -----------------------------------------------------------------
            // EXPORT / IMPORT
            // -----------------------------------------------------------------
            exportAllData() {
                const exportObj = {
                    users: this.users,
                    patients: this.patients,
                    appointments: this.appointments,
                    inventory: this.inventory,
                    prescriptions: this.prescriptions,
                    invoices: this.invoices,
                    labTests: this.labTests,
                    pettyCash: this.pettyCash,
                    auditLog: this.auditLog
                };
                const blob = new Blob([JSON.stringify(exportObj,null,2)], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clinic-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                this.showNotification('Data exported successfully','success');
            }

            importData(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        this.users          = data.users          || this.users;
                        this.patients       = data.patients       || this.patients;
                        this.appointments   = data.appointments   || this.appointments;
                        this.inventory      = data.inventory      || this.inventory;
                        this.prescriptions  = data.prescriptions  || this.prescriptions;
                        this.invoices       = data.invoices       || this.invoices;
                        this.labTests       = data.labTests       || this.labTests;
                        this.pettyCash      = data.pettyCash      || this.pettyCash;
                        this.auditLog       = data.auditLog       || this.auditLog;
                        this.saveData();
                        this.render();
                        this.showNotification('Data imported successfully','success');
                    } catch (err) {
                        this.showNotification('Invalid JSON file','error');
                    }
                };
                reader.readAsText(file);
                // reset input so the same file can be selected again
                event.target.value = '';
            }

            // -----------------------------------------------------------------
            // PATIENT MANAGEMENT (now records consulting doctor & charge)
            // -----------------------------------------------------------------
            savePatient() {
                const f = document.getElementById('patient-form');
                const fd = new FormData(f);
                const data = {
                    name:    fd.get('name'),
                    age:     fd.get('age'),
                    gender:  fd.get('gender'),
                    contact: fd.get('contact'),
                    address: fd.get('address'),
                    doctorId: parseInt(fd.get('doctorId')),
                    charge:   parseFloat(fd.get('charge'))
                };
                // basic validation
                if (!data.name || !data.age || !data.contact) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (isNaN(data.doctorId) || isNaN(data.charge)) {
                    this.showNotification('Please select a doctor and enter a valid charge','error');
                    return;
                }

                if (this.editingId) {
                    const ix = this.patients.findIndex(p=>p.id===this.editingId);
                    if (ix!==-1) {
                        this.patients[ix] = { ...this.patients[ix], ...data };
                        this.showNotification('Patient updated successfully','success');
                        this.logAction('Patient Updated', `ID ${this.editingId}`);
                    }
                } else {
                    const newPatient = {
                        id: Date.now(),
                        mrNumber: this.generateMR(),
                        ...data,
                        registeredAt: new Date().toISOString().split('T')[0]
                    };
                    this.patients.unshift(newPatient);
                    this.showNotification('Patient registered successfully','success');
                    this.logAction('Patient Created', `ID ${newPatient.id}`);
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            deletePatient(id) {
                if (confirm('Are you sure you want to delete this patient?')) {
                    this.patients = this.patients.filter(p=>p.id!==id);
                    this.saveData();
                    this.showNotification('Patient deleted successfully','success');
                    this.logAction('Patient Deleted', `ID ${id}`);
                    this.render();
                }
            }

            // -----------------------------------------------------------------
            // APPOINTMENTS
            // -----------------------------------------------------------------
            saveAppointment() {
                const f = document.getElementById('appointment-form');
                const fd = new FormData(f);
                const data = {
                    patientId: parseInt(fd.get('patientId')),
                    date:      fd.get('date'),
                    time:      fd.get('time'),
                    doctor:    fd.get('doctor'),
                    notes:     fd.get('notes')
                };
                if (!data.patientId||!data.date||!data.time||!data.doctor) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                const pat = this.patients.find(p=>p.id===data.patientId);
                data.patientName = pat ? pat.name : 'Unknown';

                if (this.editingId) {
                    const ix = this.appointments.findIndex(a=>a.id===this.editingId);
                    if (ix!==-1) {
                        this.appointments[ix] = { ...this.appointments[ix], ...data };
                        this.showNotification('Appointment updated successfully','success');
                        this.logAction('Appointment Updated', `ID ${this.editingId}`);
                    }
                } else {
                    const token = this.appointments.filter(a=>a.date===data.date).length+1;
                    const newAppt = {
                        id: Date.now(),
                        token,
                        status: 'Pending',
                        ...data
                    };
                    this.appointments.unshift(newAppt);
                    this.showNotification('Appointment booked successfully','success');
                    this.logAction('Appointment Created', `ID ${newAppt.id}`);
                }
                this.saveData();
                this.closeModal();
                this.render();
            }

            updateAppointmentStatus(id,status) {
                const a = this.appointments.find(ap=>ap.id===id);
                if (a) {
                    const old = a.status;
                    a.status = status;
                    this.saveData();
                    this.render();
                    this.showNotification(`Appointment marked as ${status}`,'success');
                    this.logAction('Appointment Status Changed', `ID ${id}: ${old} → ${status}`);
                }
            }

            deleteAppointment(id) {
                if (confirm('Are you sure you want to delete this appointment?')) {
                    this.appointments = this.appointments.filter(a=>a.id!==id);
                    this.saveData();
                    this.showNotification('Appointment deleted successfully','success');
                    this.logAction('Appointment Deleted', `ID ${id}`);
                    this.render();
                }
            }

            // -----------------------------------------------------------------
            // PRESCRIPTIONS (stock‑aware)
            // -----------------------------------------------------------------
            deletePrescription(id) {
                if (confirm('Are you sure you want to delete this prescription?')) {
                    this.prescriptions = this.prescriptions.filter(p=>p.id!==id);
                    this.saveData();
                    this.showNotification('Prescription deleted successfully','success');
                    this.logAction('Prescription Deleted', `ID ${id}`);
                    this.render();
                }
            }

            // ----- Helpers for dynamic medicine list -----
            addPrescriptionMedication(med={}) {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                const rowId = `med-row-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                const selId = med.medicineId || '';
                const qty   = med.quantity   || '';
                const row   = document.createElement('div');
                row.id      = rowId;
                row.className = 'flex items-center gap-2 mb-2';
                row.innerHTML = `
                    <select class="border rounded p-1 w-5/12 bg-white"
                            onchange="app.updatePrescriptionMedStock('${rowId}', this.value)">
                        <option value="">Select Medicine</option>
                        ${this.inventory.map(i=>`
                            <option value="${i.id}" ${i.id==selId?'selected':''}>${i.name} (${i.type})</option>
                        `).join('')}
                    </select>
                    <input type="number" class="border rounded p-1 w-24" placeholder="Qty" min="1" value="${qty}">
                    <span class="text-xs text-slate-500" id="${rowId}-stock"></span>
                    <button type="button" class="text-red-600" onclick="app.removePrescriptionMedication('${rowId}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(row);
                if (selId) this.updatePrescriptionMedStock(rowId, selId);
            }

            removePrescriptionMedication(rowId) {
                const r = document.getElementById(rowId);
                if (r) r.remove();
            }

            updatePrescriptionMedStock(rowId, medId) {
                const stockSpan = document.getElementById(`${rowId}-stock`);
                const med = this.inventory.find(i=>i.id==medId);
                stockSpan.textContent = med ? `Stock: ${med.stock}` : '';
            }

            renderPrescriptionMedicationRows() {
                const container = document.getElementById('prescription-meds-list');
                if (!container) return;
                container.innerHTML = '';
                const meds = this.formData.medicinesList || [];
                if (meds.length===0) {
                    this.addPrescriptionMedication();
                } else {
                    meds.forEach(m=>this.addPrescriptionMedication(m));
                }
            }

            // ----- Save prescription (with stock check) -----
            savePrescription() {
                const f = document.getElementById('prescription-form');
                const fd = new FormData(f);
                const patientId   = parseInt(fd.get('patientId'));
                const patientObj  = this.patients.find(p=>p.id===patientId);
                const patientName = patientObj ? patientObj.name : '';
                const diagnosis   = fd.get('diagnosis')?.trim() || '';
                const notes       = fd.get('notes')?.trim() || '';

                if (!patientName || !diagnosis) {
                    this.showNotification('Please fill in all required fields.', 'error');
                    return;
                }

                // Gather medicines from UI
                const medRows = document.querySelectorAll('#prescription-meds-list > div');
                const meds = [];
                for (let row of medRows) {
                    const sel   = row.querySelector('select');
                    const qtyIn = row.querySelector('input');
                    const medId = parseInt(sel.value);
                    const qty   = parseInt(qtyIn.value);
                    if (!medId || isNaN(qty) || qty<=0) {
                        this.showNotification('Select a medicine and enter a valid quantity for each line.', 'error');
                        return;
                    }
                    const invItem = this.inventory.find(i=>i.id===medId);
                    if (!invItem) {
                        this.showNotification('Medicine not found in inventory.', 'error');
                        return;
                    }
                    if (qty>invItem.stock) {
                        this.showNotification(`Insufficient stock for ${invItem.name}. Available: ${invItem.stock}`, 'error');
                        return;
                    }
                    meds.push({
                        medicineId: medId,
                        name:       invItem.name,
                        type:       invItem.type,
                        quantity:   qty
                    });
                }

                if (meds.length===0) {
                    this.showNotification('Please add at least one medicine.', 'error');
                    return;
                }

                // Restore old stock if editing
                if (this.editingId) {
                    const existing = this.prescriptions.find(p=>p.id===this.editingId);
                    if (existing && existing.medicinesList) {
                        existing.medicinesList.forEach(m=>{
                            const inv = this.inventory.find(i=>i.id===m.medicineId);
                            if (inv) inv.stock += m.quantity;
                        });
                    }
                }

                // Deduct new stock
                meds.forEach(m=>{
                    const inv = this.inventory.find(i=>i.id===m.medicineId);
                    if (inv) inv.stock -= m.quantity;
                });

                // Printable string
                const medicinesString = meds.map(m=>`${m.name} - ${m.quantity} ${m.type}${m.quantity>1?'s':''}`).join('\\n');

                const prescData = {
                    patientName,
                    patientId,
                    diagnosis,
                    notes,
                    medicines: medicinesString,
                    medicinesList: meds,

            // -----------------------------------------------------------------
            // STAFF
            // -----------------------------------------------------------------
            saveStaff() {
                const f = document.getElementById('staff-form');
                const fd = new FormData(f);
                const data = {
                    name:     fd.get('name'),
                    username: fd.get('username'),
                    email:    fd.get('email'),
                    password: fd.get('password'),
                    role:     fd.get('role')
                };
                if (!data.name||!data.username||!data.email||!data.role) {
                    this.showNotification('Please fill in all required fields','error');
                    return;
                }
                if (!data.password && !this.editingId) {
                    this.showNotification('Password is required for new staff','error');
                    return;
                }
                const exist = this.users.find(u=>u.username===data.username && u.id!==this.editingId);
                if (exist) { this.showNotification('Username already exists','error'); return; }

                if (this.editingId) {
                    const ix = this.users.findIndex(u=>u.id===this.editingId);
                    if (ix!==-1) {
                        if (!data.password) data.password = this.users[ix].password;
                        this.users[ix] = {...this.users[ix],...data};
                        this.showNotification('Staff member updated successfully','success');
                        this.logAction('Staff Updated', `ID ${this.editingId}`);
                    }
                } else {
                    const newStaff = { id: Date.now(), ...data };
                    this.users.push(newStaff);
                    this.showNotification('Staff member added successfully','success');
                    this.logAction('Staff Created', `ID ${newStaff.id}`);
                }
                this.saveData();
                this.closeModal();
                this.render();

                                    <span class="font-medium">Create Invoice</span>
                                </button>
                                <button onclick="app.showModal('pettycash-modal')" class="p-4 border border-slate-200 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition text-center">
                                    <i class="fas fa-wallet text-2xl text-indigo-600 dark:text-indigo-300 mb-2 block"></i>
                                    <span class="font-medium">Add Cash Expense</span>
                                </button>
                                <button onclick="app.exportAllData()" class="p-4 border border-slate-200 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition text-center">

                                    <span class="font-medium">Import Data</span>

                        </div>

                        <!-- Today's appointments -->
                        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-100 dark:border-slate-600">

                                <span class="text-sm text-slate-500 dark:text-slate-400">${new Date().toLocaleDateString()}</span>
                            </div>
                            <div class="space-y-3">
                                ${todayApts.length>0 ? todayApts.map(apt=>`
                                    <div class="flex justify-between items-center p-3 border border-slate-100 dark:border-slate-600 rounded-lg">
                                        <div>
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded text-xs font-bold">Token #${apt.token}</span>
                                                <span class="text-xs text-slate-400 dark:text-slate-300">${apt.time}</span>
                                                <span class="text-xs px-2 py-0.5 rounded ${
                                                    apt.status==='Completed' ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' :
                                                    apt.status==='Confirmed' ? 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' :
                                                    'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300'
                                                }">${apt.status}</span>

                            </div>
                        </div>
                    </div>
                `;
            }

            // -----------------------------------------------------------------
            // PATIENT LIST (now shows consulting doctor & charge)
            // -----------------------------------------------------------------
            renderPatients() {
                const filtered = this.searchTerm ?
                    this.patients.filter(p=>
                        p.name.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
                        p.mrNumber.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
                        p.contact.includes(this.searchTerm)
                    ) : this.patients;

                return `
                    <div class="space-y-6">
                        <div class="flex flex-col sm:flex-row justify-between gap-4">
                            <div class="relative max-w-md w-full">
                                <input id="search-patients" type="text" placeholder="Search by name, MR number or contact..." class="w-full pl-10 p-2.5 border rounded-lg focus:border-blue-500 outline-none dark:bg-slate-700 dark:border-slate-600 dark:text-slate-200" value="${this.searchTerm}" oninput="app.filterPatients()">

                            </div>
                            <button onclick="app.showModal('patient-modal')" class="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-medium hover:bg-blue-700 flex items-center gap-2"><i class="fas fa-user-plus"></i> New Patient</button>
                        </div>

                        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-600 overflow-hidden">
                            ${filtered.length>0 ? `
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left">
                                        <thead class="bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-semibold border-b border-slate-200 dark:border-slate-600">
                                            <tr>
                                                <th class="p-4">MR Number</th>
                                                <th class="p-4">Name</th>
                                                <th class="p-4">Age/Gender</th>
                                                <th class="p-4">Contact</th>
                                                <th class="p-4">Consulting Doctor</th>
                                                <th class="p-4">Charge</th>
                                                <th class="p-4">Registered</th>
                                                <th class="p-4 text-center">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                                            ${filtered.map(p=>`
                                                <tr class="table-row">
                                                    <td class="p-4 font-mono text-sm text-blue-600 font-bold">${p.mrNumber}</td>
                                                    <td class="p-4 font-medium dark:text-slate-200">${p.name}</td>
